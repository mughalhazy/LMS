openapi: 3.0.3
info:
  title: LMS Gateway Aggregated API
  version: 1.0.0
  description: |
    Aggregated OpenAPI surface exposed by the centralized LMS API Gateway.
    Paths are merged from docs/api/core_rest_api.md, docs/api/content_api.md,
    docs/api/integration_api.md, and docs/api/analytics_api.md.
servers:
  - url: https://api.lms.example.com

paths:
