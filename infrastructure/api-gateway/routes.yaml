    methods: [GET, POST, PATCH, PUT, DELETE]
    service: course-service
    rate_limit_policy: public-api-standard
  - path: /api/v1/integrations/hris/employees/sync
    methods: [GET, POST, PATCH, PUT, DELETE]
    service: hris-sync-service
    rate_limit_policy: public-api-standard
  - path: /api/v1/integrations/crm/contacts/upsert
    methods: [GET, POST, PATCH, PUT, DELETE]
    service: org-service
    rate_limit_policy: public-api-standard
  - path: /api/v1/integrations/lti/launch
    methods: [GET, POST, PATCH, PUT, DELETE]
    service: lti-service
    rate_limit_policy: public-api-standard
  - path: /api/v1/integrations/webhooks/events
    methods: [GET, POST, PATCH, PUT, DELETE]
    service: webhook-service
    rate_limit_policy: webhook-ingestion-guarded
  - path: /api/v1/analytics/learners/{learnerId}/progress
    methods: [GET, POST, PATCH, PUT, DELETE]
    service: learning-analytics-service
    rate_limit_policy: public-api-standard
  - path: /api/v1/analytics/courses/{courseId}/performance
    methods: [GET, POST, PATCH, PUT, DELETE]
    service: learning-analytics-service
    rate_limit_policy: public-api-standard
  - path: /api/v1/analytics/skills
    methods: [GET, POST, PATCH, PUT, DELETE]
    service: skill-analytics-service
    rate_limit_policy: public-api-standard
  - path: /api/v1/analytics/compliance/reports
    methods: [GET, POST, PATCH, PUT, DELETE]
    service: reporting-service
    rate_limit_policy: public-api-standard
  - path: /api/v1/auth/login
    methods: [POST]
    service: auth-service
    rate_limit_policy: auth-login-strict
  - path: /api/v1/attempts
    methods: [POST]
    service: attempt-service
    rate_limit_policy: public-api-standard
  - path: /api/v1/attempts/{attemptId}/answers
    methods: [POST]
    service: attempt-service
    rate_limit_policy: public-api-standard
  - path: /api/v1/events/ingest
    methods: [POST]
    service: event-ingestion-service
    rate_limit_policy: event-ingestion-guarded

