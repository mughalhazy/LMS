version: 1
provider:
  name: vault
  path_prefix: secret/data/lms
  auth_method: kubernetes
  rotation:
    default_days: 90
    database_credentials_days: 30
    api_keys_days: 30

global_secrets:
  - id: jwt_shared_secret
    path: secret/data/lms/global/jwt
    key: shared_secret
    type: application_secret
  - id: encryption_master_key
    path: secret/data/lms/global/crypto
    key: master_key
    type: encryption_key
  - id: kms_key_id
    path: secret/data/lms/global/crypto
    key: kms_key_id
    type: encryption_key

service_secret_contract:
  required:
    - env: JWT_SHARED_SECRET
      source: jwt_shared_secret
    - env: DATABASE_URL
      source: service_database_url
    - env: SERVICE_API_KEY
      source: service_api_key
    - env: ENCRYPTION_KEY
      source: service_encryption_key

secret_groups:
  api_keys:
    template_path: secret/data/lms/services/{service}/api
    key: api_key
  database_credentials:
    template_path: secret/data/lms/services/{service}/database
    keys: [username, password, host, port, database, url]
  encryption_keys:
    template_path: secret/data/lms/services/{service}/crypto
    key: encryption_key
