name: lms-backend
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: lms
      POSTGRES_USER: lms
      POSTGRES_PASSWORD: lms
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - lms-backend-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lms -d lms"]
      interval: 10s
      timeout: 5s
      retries: 5
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - lms-backend-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
  ai-tutor-service:
    build:
      context: ../..
      dockerfile: infrastructure/deployment/docker/Dockerfile.python
      args:
        SERVICE_PATH: backend/services/ai-tutor-service
    env_file:
      - ./env/common.env
      - ./env/services.env
    environment:
      SERVICE_NAME: ai-tutor-service
      SERVICE_PORT: "8100"
      APP_MODULE: "app.main:app"
      START_COMMAND: ""
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8100:8100"
    networks:
      - lms-backend-net
    restart: unless-stopped
  api-key-service:
    build:
      context: ../..
      dockerfile: infrastructure/deployment/docker/Dockerfile.python
