<!DOCTYPE html>
<html lang="en">
<head>
<!--
  Page     : Reset Password
  Archetype: A12 Single Focus Form — Center · no nav · no sidebar · minimal footer
  Created  : 2026-03-28
  Surface  : Public (unauthenticated)
  Repo     :
    auth-service (BaseHTTPRequestHandler — not FastAPI):
      POST /api/v1/auth/password/forgot
           → ForgotPasswordRequest { tenant_id, email }
           → (ForgotPasswordResponse — BG-161: shape undefined, mocked)
           Triggers email with reset link containing ResetChallenge.token
      POST /api/v1/auth/password/reset
           → ResetPasswordRequest { tenant_id, email, reset_token, new_password }
           → (ResetPasswordResponse — BG-162: shape undefined, mocked)
           ResetChallenge model: { challenge_id, user_id, tenant_id, token, expires_at, used }
           reset_token = ResetChallenge.token — delivered via email link (BG-162)
  Gaps     :
    BG-161 — ForgotPasswordResponse shape undefined — mocked as { status:"sent", message }
    BG-162 — ResetPasswordResponse undefined + reset_token email-delivered — token read
              from URL ?token= param; email from URL ?email= param; mocked fallbacks provided
  Patterns :
    A12 Single Focus Form · CSS base: lms-a12-mfa-v1.html (:root verbatim)
    Public surface: no zoom · body:14px · lh:1.6
    Layout: full-viewport flex center · card max-width:420px
    Dual-mode page: URL ?token= absent → Request mode (email entry)
                    URL ?token= present → Reset mode (new password entry)
    In-page mode toggle for dev preview
    Password strength bar · client-side match validation
    Dev state bar: Idle · Loading · Error · Success
  Mock     :
    ForgotPasswordResponse: { status:"sent", message: "If that address is registered, a reset link has been sent." }
    ResetPasswordResponse: { status:"ok" } (BG-162)
    Mock token fallback: "mock-reset-token-001"
  States   : Idle · Loading · Error · Success
  CSS anchor: lms-a12-mfa-v1.html
-->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LMS — Reset Password</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ── VERBATIM FOUNDATION — lms-a12-mfa-v1.html ── */
:root {
  --canvas:#F7F7F5;--white:#FFFFFF;--subtle:#F2F2F0;
  --border:#E8E8E4;--border-s:#D8D8D2;--border-focus:#5B5BD6;
  --ink:#1A1A18;--ink-2:#52524E;--ink-3:#8C8C84;--ink-4:#C0C0B8;
  --accent:#5B5BD6;--accent-lt:#F0F0FF;
  --green:#18794E;--green-bg:rgba(24,121,78,.08);--green-bd:rgba(24,121,78,.15);
  --amber:#92400E;--amber-bg:#FEF9EE;--amber-bd:rgba(146,64,14,.15);
  --red:#C42B1C;--red-bg:rgba(196,43,28,.07);--red-bd:rgba(196,43,28,.14);
  --gold:#78350F;--gold-bg:#FFFBEB;--gold-bd:rgba(245,158,11,.2);
  --font:'Plus Jakarta Sans',system-ui,sans-serif;
  --sh-xs:0 1px 2px rgba(0,0,0,.04);
  --sh-sm:0 2px 8px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --r:14px;--r-sm:8px;--r-pill:999px;
  --pp:28px;--body-size:13px;--lh:1.5;
  --topbar-h:56px;
  --filter-panel-w:240px;
  --card-gap:16px;
  --card-w:420px;
  --mfa-card-w:400px;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
body{font-family:var(--font);background:var(--canvas);color:var(--ink);-webkit-font-smoothing:antialiased;font-size:14px;line-height:1.6;min-height:100vh;display:flex;flex-direction:column;}

/* ── A12 SHELL ── */
.a12-shell{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;}

/* ── CARD ── */
.rp-card{width:100%;max-width:var(--card-w);background:var(--white);border-radius:var(--r);border:1px solid var(--border);box-shadow:var(--sh-sm);padding:40px;}

/* Logo */
.lc-logo{font-size:20px;font-weight:800;color:var(--ink);letter-spacing:-0.02em;text-align:center;margin-bottom:20px;}

/* Card title: 22px 700 */
.lc-title{font-size:22px;font-weight:700;color:var(--ink);letter-spacing:-0.02em;text-align:center;margin-bottom:6px;}

/* Subtitle: 13px 500 */
.lc-sub{font-size:13px;font-weight:500;color:var(--ink-3);text-align:center;margin-bottom:28px;line-height:1.5;}

/* ── FORM MESSAGES ── */
.form-msg{border-radius:var(--r-sm);padding:10px 14px;font-size:12px;font-weight:600;margin-bottom:16px;display:none;text-align:center;}
.form-msg.show{display:block;}
.form-msg.error{background:var(--red-bg);border:1px solid var(--red-bd);color:var(--red);}
.form-msg.success{background:var(--green-bg);border:1px solid var(--green-bd);color:var(--green);}

/* ── FIELDS ── */
.field{display:flex;flex-direction:column;gap:5px;margin-bottom:14px;}
.field-label{font-size:11px;font-weight:700;color:var(--ink-2);letter-spacing:.01em;}
.field-label .req{color:var(--red);margin-left:2px;}
.field-input{width:100%;padding:10px 12px;border-radius:var(--r-sm);border:1px solid var(--border-s);background:var(--white);font-family:var(--font);font-size:13px;font-weight:500;color:var(--ink);outline:none;transition:border-color 150ms,background 150ms;}
.field-input:focus{border-color:var(--border-focus);box-shadow:0 0 0 3px rgba(91,91,214,.08);}
.field-input::placeholder{color:var(--ink-4);}
.field-input.err{border-color:var(--red);background:var(--red-bg);}

/* Password strength bar */
.pw-strength{height:3px;border-radius:2px;background:var(--border);margin-top:6px;overflow:hidden;}
.pw-strength-fill{height:100%;border-radius:2px;width:0%;transition:width 200ms,background 200ms;}

/* ── PRIMARY BUTTON ── */
.btn-primary{width:100%;padding:11px 16px;border-radius:var(--r-sm);border:none;background:var(--accent);font-family:var(--font);font-size:13px;font-weight:700;color:#fff;cursor:pointer;transition:background 120ms;margin-top:8px;display:flex;align-items:center;justify-content:center;gap:8px;}
.btn-primary:hover:not(:disabled){background:#4d4dbf;}
.btn-primary:disabled{opacity:.65;cursor:not-allowed;}

/* Spinner */
.spinner{width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin 600ms linear infinite;display:none;flex-shrink:0;}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── MODE TOGGLE (dev) ── */
.mode-toggle{display:flex;justify-content:center;gap:0;margin-bottom:28px;border:1px solid var(--border);border-radius:var(--r-sm);overflow:hidden;}
.mode-btn{flex:1;padding:7px 12px;border:none;background:var(--white);font-family:var(--font);font-size:11px;font-weight:700;color:var(--ink-3);cursor:pointer;transition:all 120ms;}
.mode-btn.on{background:var(--accent-lt);color:var(--accent);}
.mode-btn:not(:last-child){border-right:1px solid var(--border);}

/* ── BACK / SIGN IN LINKS ── */
.back-row{text-align:center;margin-top:16px;font-size:12px;color:var(--ink-3);}
.back-row a{color:var(--accent);font-weight:700;text-decoration:none;}
.back-row a:hover{text-decoration:underline;}

/* ── FOOTER ── */
.a12-footer{text-align:center;font-size:11px;font-weight:500;color:var(--ink-4);padding:20px 0 12px;}
.a12-footer a{color:var(--ink-3);text-decoration:none;}
.a12-footer a:hover{color:var(--ink-2);}

/* ── STATE BAR ── */
.state-bar{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1A1A18;border-radius:var(--r-pill);padding:5px 6px;display:flex;gap:3px;z-index:9999;box-shadow:0 4px 20px rgba(0,0,0,.25);}
.stb{padding:5px 12px;border-radius:var(--r-pill);border:none;font-family:var(--font);font-size:11px;font-weight:700;cursor:pointer;background:transparent;color:rgba(255,255,255,.4);transition:all 150ms;}
.stb.on{background:white;color:#1A1A18;}

/* ── TOAST ── */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1A1A18;color:#fff;padding:10px 20px;border-radius:var(--r-pill);font-size:12px;font-weight:600;opacity:0;transition:opacity 200ms;pointer-events:none;z-index:9998;white-space:nowrap;}
.toast.show{opacity:1;}
</style>
</head>
<body>

<div class="a12-shell">

  <div class="rp-card">

    <!-- Logo -->
    <div class="lc-logo">◆ LMS</div>

    <!-- Dev mode toggle — simulates URL param presence -->
    <div class="mode-toggle">
      <button class="mode-btn on" id="mode-request" onclick="setMode('request')">Request link</button>
      <button class="mode-btn"    id="mode-reset"   onclick="setMode('reset')">Enter new password</button>
    </div>

    <!-- ── REQUEST MODE ── -->
    <!-- POST /api/v1/auth/password/forgot → ForgotPasswordRequest { tenant_id, email }
         BG-161: ForgotPasswordResponse shape undefined — mocked -->
    <div id="pane-request">
      <div class="lc-title">Forgot your password?</div>
      <div class="lc-sub">Enter your work email and we'll send you a reset link.</div>

      <div class="form-msg error"   id="req-error"></div>
      <div class="form-msg success" id="req-success"></div>

      <form id="request-form" onsubmit="handleRequest(event)" novalidate>
        <div class="field">
          <label class="field-label" for="f-email">Work email<span class="req">*</span></label>
          <input class="field-input" id="f-email" type="email"
                 placeholder="you@company.com" autocomplete="email" required>
        </div>
        <button class="btn-primary" id="btn-req" type="submit">
          <span class="spinner" id="req-spinner"></span>
          <span id="req-label">Send reset link</span>
        </button>
      </form>

      <div class="back-row" style="margin-top:16px;">
        <a href="lms-a12-login-v1.html">&larr; Back to sign in</a>
      </div>
    </div>

    <!-- ── RESET MODE ── -->
    <!-- POST /api/v1/auth/password/reset → ResetPasswordRequest { tenant_id, email, reset_token, new_password }
         BG-162: ResetPasswordResponse undefined · reset_token from URL ?token= param -->
    <div id="pane-reset" style="display:none;">
      <div class="lc-title">Set new password</div>
      <div class="lc-sub">Choose a new password for <strong id="reset-email-label">your account</strong>.</div>

      <div class="form-msg error"   id="reset-error"></div>
      <div class="form-msg success" id="reset-success"></div>

      <form id="reset-form" onsubmit="handleReset(event)" novalidate>
        <div class="field">
          <label class="field-label" for="f-new-pw">New password<span class="req">*</span></label>
          <input class="field-input" id="f-new-pw" type="password"
                 placeholder="Min. 8 characters" autocomplete="new-password" required
                 oninput="updateStrength()">
          <div class="pw-strength"><div class="pw-strength-fill" id="pw-fill"></div></div>
        </div>
        <div class="field">
          <label class="field-label" for="f-confirm-pw">Confirm new password<span class="req">*</span></label>
          <input class="field-input" id="f-confirm-pw" type="password"
                 placeholder="Re-enter password" autocomplete="new-password" required>
        </div>
        <button class="btn-primary" id="btn-reset" type="submit">
          <span class="spinner" id="reset-spinner"></span>
          <span id="reset-label">Reset password</span>
        </button>
      </form>

      <div class="back-row" style="margin-top:16px;">
        <a href="lms-a12-login-v1.html">&larr; Back to sign in</a>
      </div>
    </div>

  </div><!-- /rp-card -->

  <div class="a12-footer">
    &copy; 2026 LMS Enterprise &nbsp;&middot;&nbsp;
    <a href="#">Privacy</a> &nbsp;&middot;&nbsp; <a href="#">Terms</a>
  </div>

</div><!-- /a12-shell -->

<!-- ── STATE BAR ── -->
<div class="state-bar">
  <button class="stb on" onclick="showState('idle')">Idle</button>
  <button class="stb" onclick="showState('loading')">Loading</button>
  <button class="stb" onclick="showState('error')">Error</button>
  <button class="stb" onclick="showState('success')">Success</button>
</div>

<!-- ── TOAST ── -->
<div class="toast" id="toast"></div>

<script>
/* ── URL PARAMS ── */
/* BG-162: reset_token and email delivered via email link URL params */
const urlParams  = new URLSearchParams(window.location.search);
const URL_TOKEN  = urlParams.get('token') || null;
const URL_EMAIL  = urlParams.get('email') || null;

/* BG-154 (existing): tenant_id pre-populated */
const TENANT_ID  = 'tenant-001';

/* Determine initial mode from URL */
let currentMode = URL_TOKEN ? 'reset' : 'request';

/* ── INIT ── */
function init() {
  if (URL_EMAIL) {
    document.getElementById('reset-email-label').textContent = URL_EMAIL;
  }
  setMode(currentMode);
}

/* ── MODE SWITCH ── */
function setMode(mode) {
  currentMode = mode;
  document.getElementById('pane-request').style.display = mode === 'request' ? 'block' : 'none';
  document.getElementById('pane-reset').style.display   = mode === 'reset'   ? 'block' : 'none';
  document.getElementById('mode-request').classList.toggle('on', mode === 'request');
  document.getElementById('mode-reset').classList.toggle('on',   mode === 'reset');
  clearAllMessages();
}

/* ── REQUEST HANDLER ── */
function handleRequest(e) {
  e.preventDefault();
  clearMsg('req-error'); clearMsg('req-success');
  const email = document.getElementById('f-email').value.trim();
  if (!email) { showMsg('req-error', 'Please enter your email address.'); return; }

  setLoading('req', true);

  /* Simulate POST /api/v1/auth/password/forgot
     BG-161: ForgotPasswordResponse shape undefined — mocked
     Deliberately ambiguous message prevents email enumeration */
  setTimeout(() => {
    setLoading('req', false);
    /* BG-161: mocked response { status:"sent", message } */
    showMsg('req-success', 'If that address is registered, a reset link has been sent. Check your inbox.');
    document.getElementById('f-email').value = '';
  }, 900);
}

/* ── RESET HANDLER ── */
function handleReset(e) {
  e.preventDefault();
  clearMsg('reset-error'); clearMsg('reset-success');
  document.getElementById('f-new-pw').classList.remove('err');
  document.getElementById('f-confirm-pw').classList.remove('err');

  const newPw    = document.getElementById('f-new-pw').value;
  const confirm  = document.getElementById('f-confirm-pw').value;

  if (!newPw || !confirm) {
    showMsg('reset-error', 'Please fill in both password fields.');
    return;
  }
  if (newPw.length < 8) {
    document.getElementById('f-new-pw').classList.add('err');
    showMsg('reset-error', 'Password must be at least 8 characters.');
    return;
  }
  if (newPw !== confirm) {
    document.getElementById('f-confirm-pw').classList.add('err');
    showMsg('reset-error', 'Passwords do not match.');
    return;
  }

  setLoading('reset', true);

  /* Simulate POST /api/v1/auth/password/reset
     BG-162: reset_token from URL param (fallback to mock) · ResetPasswordResponse mocked
     ResetPasswordRequest { tenant_id, email, reset_token, new_password } */
  const _payload = {
    tenant_id:   TENANT_ID,
    email:       URL_EMAIL || 'user@acme.com',
    reset_token: URL_TOKEN || 'mock-reset-token-001',   /* BG-162: email-delivered */
    new_password: newPw,
  };

  setTimeout(() => {
    setLoading('reset', false);
    /* BG-162: ResetPasswordResponse mocked as { status:"ok" } */
    document.getElementById('f-new-pw').value     = '';
    document.getElementById('f-confirm-pw').value = '';
    document.getElementById('pw-fill').style.width = '0%';
    showMsg('reset-success', '\u2713 Password updated \u2014 you can now sign in with your new password.');
    /* In production: redirect to login after short delay */
  }, 900);
}

/* ── PASSWORD STRENGTH ── */
function updateStrength() {
  const pw   = document.getElementById('f-new-pw').value;
  const fill = document.getElementById('pw-fill');
  const score = [pw.length >= 8, /[A-Z]/.test(pw), /[0-9]/.test(pw), /[^A-Za-z0-9]/.test(pw)]
    .filter(Boolean).length;
  const widths = ['0%','25%','50%','75%','100%'];
  const colors = ['transparent','#C42B1C','#F59E0B','#5B5BD6','#18794E'];
  fill.style.width      = widths[score];
  fill.style.background = colors[score];
}

/* ── LOADING HELPERS ── */
function setLoading(prefix, on) {
  const btn = document.getElementById('btn-' + prefix);
  const sp  = document.getElementById(prefix + '-spinner');
  const lbl = document.getElementById(prefix + '-label');
  btn.disabled     = on;
  sp.style.display = on ? 'block' : 'none';
  const labels = { req: ['Send reset link','Sending\u2026'], reset: ['Reset password','Resetting\u2026'] };
  lbl.textContent  = on ? labels[prefix][1] : labels[prefix][0];
}

/* ── MESSAGE HELPERS ── */
function showMsg(id, msg) {
  const el = document.getElementById(id);
  el.textContent = msg; el.classList.add('show');
}
function clearMsg(id) { document.getElementById(id).classList.remove('show'); }
function clearAllMessages() {
  ['req-error','req-success','reset-error','reset-success'].forEach(clearMsg);
}

/* ── STATE SWITCHER ── */
function showState(s) {
  clearAllMessages();
  setLoading('req', false);
  setLoading('reset', false);
  document.getElementById('f-new-pw').classList.remove('err');
  document.getElementById('f-confirm-pw').classList.remove('err');

  if (s === 'loading') {
    currentMode === 'request' ? setLoading('req', true) : setLoading('reset', true);
  }
  if (s === 'error') {
    currentMode === 'request'
      ? showMsg('req-error',   'Something went wrong. Please try again.')
      : showMsg('reset-error', 'This reset link has expired. Please request a new one.');
  }
  if (s === 'success') {
    currentMode === 'request'
      ? showMsg('req-success',   'If that address is registered, a reset link has been sent. Check your inbox.')
      : showMsg('reset-success', '\u2713 Password updated \u2014 you can now sign in with your new password.');
  }
  document.querySelectorAll('.stb').forEach(b =>
    b.classList.toggle('on', b.textContent.toLowerCase() === s)
  );
}

/* ── TOAST ── */
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2600);
}

init();
</script>
</body>
</html>
