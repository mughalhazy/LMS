<!DOCTYPE html>
<html lang="en">
<head>
<!--
  Page     : Login
  Archetype: A12 Single Focus Form — Center · no nav · no sidebar · minimal footer
  Created  : 2026-03-28
  Surface  : Public (pre-authentication)
  Repo     :
    auth-service (BaseHTTPRequestHandler — not FastAPI):
      POST /api/v1/auth/login
           → LoginRequest { tenant_id, email, password }
           → LoginResponse (BG-153: shape undefined — mocked)
      POST /api/v1/auth/password/forgot
           → ForgotPasswordRequest { tenant_id, email }
           NOTE: tenant_id has no discovery endpoint — BG-154
    sso-service (FastAPI · JWT required — BG-155):
      GET  /providers → { providers_supported: dict }  (JWT required — not callable pre-auth)
      POST /sso/initiate
           → InitiateSSORequest { tenant_id, provider:"saml"|"oauth2"|"oidc",
               relay_state?, nonce?, config: Dict[str,Any] }
           → SSOInitResponse { provider, flow, redirect_url, correlation_id }
           NOTE: config must be full SAMLConfig/OAuth2Config/OIDCConfig from client — BG-155
           NOTE: require_jwt on /sso/initiate creates pre-auth bootstrap deadlock — BG-155
    ProviderType enum: saml | oauth2 | oidc
    UserCredential model: { user_id, tenant_id, organization_id, email,
      password_hash, roles, status, last_login_at }
    Session model: { session_id, user_id, tenant_id, issued_at,
      expires_at, refresh_expires_at, revoked }
  Gaps     :
    BG-153 — auth-service LoginResponse shape undefined in schemas.py — response mocked as
              { session_id, access_token, refresh_token, user_id, tenant_id, roles, expires_in }
    BG-154 — no tenant discovery endpoint — tenant_id hardcoded as 'tenant-001'
    BG-155 — sso-service: client-supplied config anti-pattern + JWT pre-auth deadlock — SSO simulated
  Patterns :
    A12 Single Focus Form · first page of archetype — sets A12 CSS anchor
    CSS base: lms-a11-content-library-v1.html (:root verbatim)
    Public surface: no zoom · body:14px · lh:1.6
    Layout: full-viewport flex center · login card max-width:420px
    Logo mark at card top · labelled form fields · primary CTA full-width
    SSO section: OR divider + 3 provider buttons (SAML · OAuth 2.0 · OIDC)
    Dev state bar: Idle · Loading · Error · Success
  Mock     :
    3 mock users (admin / instructor / learner) — LoginResponse (BG-153)
    SSOInitResponse mock — { provider, flow, redirect_url, correlation_id } (BG-155)
  States   : Idle · Loading · Error · Success
  CSS anchor: lms-a11-content-library-v1.html
-->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LMS — Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ── VERBATIM FOUNDATION — lms-a11-content-library-v1.html ── */
:root {
  --canvas:#F7F7F5;--white:#FFFFFF;--subtle:#F2F2F0;
  --border:#E8E8E4;--border-s:#D8D8D2;--border-focus:#5B5BD6;
  --ink:#1A1A18;--ink-2:#52524E;--ink-3:#8C8C84;--ink-4:#C0C0B8;
  --accent:#5B5BD6;--accent-lt:#F0F0FF;
  --green:#18794E;--green-bg:rgba(24,121,78,.08);--green-bd:rgba(24,121,78,.15);
  --amber:#92400E;--amber-bg:#FEF9EE;--amber-bd:rgba(146,64,14,.15);
  --red:#C42B1C;--red-bg:rgba(196,43,28,.07);--red-bd:rgba(196,43,28,.14);
  --gold:#78350F;--gold-bg:#FFFBEB;--gold-bd:rgba(245,158,11,.2);
  --font:'Plus Jakarta Sans',system-ui,sans-serif;
  --sh-xs:0 1px 2px rgba(0,0,0,.04);
  --sh-sm:0 2px 8px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --r:14px;--r-sm:8px;--r-pill:999px;
  --pp:28px;--body-size:13px;--lh:1.5;
  --topbar-h:56px;
  --filter-panel-w:240px;
  --card-gap:16px;
  /* A12 Single Focus Form */
  --card-w:420px;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
body{font-family:var(--font);background:var(--canvas);color:var(--ink);-webkit-font-smoothing:antialiased;font-size:14px;line-height:1.6;min-height:100vh;display:flex;flex-direction:column;}

/* ── A12 SHELL ── */
.a12-shell{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;}

/* ── LOGIN CARD ── */
.login-card{width:100%;max-width:var(--card-w);background:var(--white);border-radius:var(--r);border:1px solid var(--border);box-shadow:var(--sh-sm);padding:40px;}

/* Logo: 20px 800 -0.02em — topbar logo scale */
.lc-logo{font-size:20px;font-weight:800;color:var(--ink);letter-spacing:-0.02em;text-align:center;margin-bottom:20px;}

/* Card title: 22px 700 -0.02em */
.lc-title{font-size:22px;font-weight:700;color:var(--ink);letter-spacing:-0.02em;text-align:center;margin-bottom:4px;}

/* Subtitle: 13px 500 */
.lc-sub{font-size:13px;font-weight:500;color:var(--ink-3);text-align:center;margin-bottom:28px;}

/* ── FORM MESSAGES ── */
.form-msg{border-radius:var(--r-sm);padding:10px 14px;font-size:12px;font-weight:600;margin-bottom:16px;display:none;}
.form-msg.show{display:block;}
.form-msg.error{background:var(--red-bg);border:1px solid var(--red-bd);color:var(--red);}
.form-msg.success{background:var(--green-bg);border:1px solid var(--green-bd);color:var(--green);text-align:center;}

/* ── FIELDS ── */
.field{display:flex;flex-direction:column;gap:5px;margin-bottom:14px;}
/* Label: 11px 700 */
.field-label{font-size:11px;font-weight:700;color:var(--ink-2);letter-spacing:.01em;}
.field-label .req{color:var(--red);margin-left:2px;}
.field-input{width:100%;padding:10px 12px;border-radius:var(--r-sm);border:1px solid var(--border-s);background:var(--white);font-family:var(--font);font-size:13px;font-weight:500;color:var(--ink);outline:none;transition:border-color 150ms,background 150ms;}
.field-input:focus{border-color:var(--border-focus);box-shadow:0 0 0 3px rgba(91,91,214,.08);}
.field-input::placeholder{color:var(--ink-4);}
.field-input.err{border-color:var(--red);background:var(--red-bg);}

/* Forgot password link */
.forgot-row{display:flex;justify-content:flex-end;margin-top:5px;}
.forgot-link{font-size:11px;font-weight:600;color:var(--accent);text-decoration:none;}
.forgot-link:hover{text-decoration:underline;}

/* ── PRIMARY BUTTON ── */
.btn-primary{width:100%;padding:11px 16px;border-radius:var(--r-sm);border:none;background:var(--accent);font-family:var(--font);font-size:13px;font-weight:700;color:#fff;cursor:pointer;transition:background 120ms;margin-top:8px;display:flex;align-items:center;justify-content:center;gap:8px;}
.btn-primary:hover:not(:disabled){background:#4d4dbf;}
.btn-primary:disabled{opacity:.65;cursor:not-allowed;}

/* Spinner */
.spinner{width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin 600ms linear infinite;display:none;flex-shrink:0;}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── DIVIDER ── */
.divider{display:flex;align-items:center;gap:12px;margin:24px 0;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border);}
/* Divider label: 11px 600 */
.divider span{font-size:11px;font-weight:600;color:var(--ink-3);white-space:nowrap;}

/* ── SSO BUTTONS ── */
.sso-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.btn-sso{padding:9px 8px;border-radius:var(--r-sm);border:1px solid var(--border);background:var(--white);font-family:var(--font);font-size:12px;font-weight:700;color:var(--ink-2);cursor:pointer;transition:all 120ms;text-align:center;}
.btn-sso:hover{background:var(--subtle);border-color:var(--border-s);}

/* ── FOOTER ── */
.a12-footer{text-align:center;font-size:11px;font-weight:500;color:var(--ink-4);padding:20px 0 12px;}
.a12-footer a{color:var(--ink-3);text-decoration:none;}
.a12-footer a:hover{color:var(--ink-2);}

/* ── STATE BAR ── */
.state-bar{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1A1A18;border-radius:var(--r-pill);padding:5px 6px;display:flex;gap:3px;z-index:9999;box-shadow:0 4px 20px rgba(0,0,0,.25);}
.stb{padding:5px 12px;border-radius:var(--r-pill);border:none;font-family:var(--font);font-size:11px;font-weight:700;cursor:pointer;background:transparent;color:rgba(255,255,255,.4);transition:all 150ms;}
.stb.on{background:white;color:#1A1A18;}

/* ── TOAST ── */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1A1A18;color:#fff;padding:10px 20px;border-radius:var(--r-pill);font-size:12px;font-weight:600;opacity:0;transition:opacity 200ms;pointer-events:none;z-index:9998;white-space:nowrap;}
.toast.show{opacity:1;}
</style>
</head>
<body>

<div class="a12-shell">

  <!-- ── LOGIN CARD ── -->
  <div class="login-card">

    <!-- Logo mark -->
    <div class="lc-logo">◆ LMS</div>

    <!-- Heading -->
    <div class="lc-title">Sign in</div>
    <div class="lc-sub">Enter your credentials to continue</div>

    <!-- Form messages -->
    <div class="form-msg error" id="form-error"></div>
    <div class="form-msg success" id="form-success"></div>

    <!-- Credential form
         POST /api/v1/auth/login → LoginRequest { tenant_id, email, password }
         BG-153: LoginResponse mocked · BG-154: tenant_id pre-populated constant -->
    <form id="login-form" onsubmit="handleLogin(event)" novalidate>

      <div class="field">
        <label class="field-label" for="f-email">Email<span class="req">*</span></label>
        <input class="field-input" id="f-email" type="email"
               placeholder="you@company.com" autocomplete="email" required>
      </div>

      <div class="field">
        <label class="field-label" for="f-password">Password<span class="req">*</span></label>
        <input class="field-input" id="f-password" type="password"
               placeholder="••••••••" autocomplete="current-password" required>
        <div class="forgot-row">
          <a class="forgot-link" href="#" onclick="handleForgotPassword(event)">Forgot password?</a>
        </div>
      </div>

      <button class="btn-primary" id="btn-signin" type="submit">
        <span class="spinner" id="btn-spinner"></span>
        <span id="btn-label">Sign in</span>
      </button>

    </form>

    <!-- SSO section
         POST /sso/initiate → SSOInitResponse { provider, flow, redirect_url, correlation_id }
         BG-155: JWT pre-auth deadlock + client config anti-pattern — all SSO calls simulated -->
    <div class="divider"><span>or continue with</span></div>
    <div class="sso-grid">
      <button class="btn-sso" onclick="initSSO('saml')">SAML</button>
      <button class="btn-sso" onclick="initSSO('oauth2')">OAuth 2.0</button>
      <button class="btn-sso" onclick="initSSO('oidc')">OIDC</button>
    </div>

  </div><!-- /login-card -->

  <div class="a12-footer">
    &copy; 2026 LMS Enterprise &nbsp;&middot;&nbsp;
    <a href="#">Privacy</a> &nbsp;&middot;&nbsp; <a href="#">Terms</a>
  </div>

</div><!-- /a12-shell -->

<!-- ── STATE BAR ── -->
<div class="state-bar">
  <button class="stb on" onclick="showState('idle')">Idle</button>
  <button class="stb" onclick="showState('loading')">Loading</button>
  <button class="stb" onclick="showState('error')">Error</button>
  <button class="stb" onclick="showState('success')">Success</button>
</div>

<!-- ── TOAST ── -->
<div class="toast" id="toast"></div>

<script>
/* ── MOCK DATA ── */

/* auth-service: POST /api/v1/auth/login
   LoginRequest  { tenant_id, email, password }
   LoginResponse (BG-153 — shape undefined in schemas.py, mocked):
     { session_id, access_token, refresh_token, user_id, tenant_id, roles, expires_in } */
const MOCK_USERS = [
  { email:'admin@acme.com',       password:'password', user_id:'usr-001', roles:['admin'] },
  { email:'instructor@acme.com',  password:'password', user_id:'usr-002', roles:['instructor'] },
  { email:'learner@acme.com',     password:'password', user_id:'usr-003', roles:['learner'] },
];

/* BG-154: no tenant discovery endpoint — tenant_id pre-populated */
const TENANT_ID = 'tenant-001';

/* sso-service: POST /sso/initiate
   SSOInitResponse { provider, flow, redirect_url, correlation_id } (BG-155 — simulated) */
function mockSSOResponse(provider) {
  return {
    provider,
    flow: provider === 'saml' ? 'redirect' : 'popup',
    redirect_url: '#sso-redirect-' + provider,
    correlation_id: 'corr-' + Math.random().toString(36).slice(2, 8),
  };
}

/* ── CREDENTIAL LOGIN ── */
function handleLogin(e) {
  e.preventDefault();
  const email    = document.getElementById('f-email').value.trim();
  const password = document.getElementById('f-password').value;
  clearMessages();

  if (!email || !password) {
    showError('Please enter your email and password.');
    return;
  }

  setLoading(true);

  /* Simulate POST /api/v1/auth/login (900ms round-trip) */
  setTimeout(() => {
    setLoading(false);
    const user = MOCK_USERS.find(u => u.email === email && u.password === password);
    if (user) {
      /* BG-153: LoginResponse shape mocked */
      const _resp = {
        session_id:    'sess-' + Math.random().toString(36).slice(2, 10),
        access_token:  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.mocked',
        refresh_token: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.refresh_mocked',
        user_id:       user.user_id,
        tenant_id:     TENANT_ID,
        roles:         user.roles,
        expires_in:    3600,
      };
      /* In production: store tokens, redirect by role */
      showSuccess('\u2713 Signed in as ' + email + ' \u00b7 redirecting\u2026');
    } else {
      document.getElementById('f-email').classList.add('err');
      document.getElementById('f-password').classList.add('err');
      showError('Invalid email or password. Please try again.');
    }
  }, 900);
}

/* ── FORGOT PASSWORD ── */
function handleForgotPassword(e) {
  e.preventDefault();
  const email = document.getElementById('f-email').value.trim();
  if (!email) {
    showError('Enter your email address above, then click \u201cForgot password?\u201d');
    return;
  }
  /* POST /api/v1/auth/password/forgot — ForgotPasswordRequest { tenant_id, email } */
  showToast('Reset link sent \u2014 check your inbox');
}

/* ── SSO INITIATION ── */
function initSSO(provider) {
  /* BG-155: POST /sso/initiate simulated — JWT deadlock + client config anti-pattern */
  const resp = mockSSOResponse(provider);
  showToast(provider.toUpperCase() + ' flow initiated \u00b7 ' + resp.correlation_id);
  /* In production: window.location.href = resp.redirect_url */
}

/* ── LOADING STATE ── */
function setLoading(on) {
  const btn = document.getElementById('btn-signin');
  const sp  = document.getElementById('btn-spinner');
  const lbl = document.getElementById('btn-label');
  btn.disabled       = on;
  sp.style.display   = on ? 'block' : 'none';
  lbl.textContent    = on ? 'Signing in\u2026' : 'Sign in';
}

/* ── MESSAGE HELPERS ── */
function clearMessages() {
  document.getElementById('form-error').classList.remove('show');
  document.getElementById('form-success').classList.remove('show');
  document.getElementById('f-email').classList.remove('err');
  document.getElementById('f-password').classList.remove('err');
}
function showError(msg) {
  const el = document.getElementById('form-error');
  el.textContent = msg;
  el.classList.add('show');
}
function showSuccess(msg) {
  const el = document.getElementById('form-success');
  el.textContent = msg;
  el.classList.add('show');
}

/* ── STATE SWITCHER ── */
function showState(s) {
  clearMessages();
  setLoading(false);
  if (s === 'loading') { setLoading(true); }
  if (s === 'error')   { showError('Invalid email or password. Please try again.'); }
  if (s === 'success') { showSuccess('\u2713 Signed in as admin@acme.com \u00b7 redirecting\u2026'); }
  document.querySelectorAll('.stb').forEach(b =>
    b.classList.toggle('on', b.textContent.toLowerCase() === s)
  );
}

/* ── TOAST ── */
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2600);
}
</script>
</body>
</html>
