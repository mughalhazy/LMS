<!DOCTYPE html>
<html lang="en">
<head>
<!--
  Page     : MFA Verification
  Archetype: A12 Single Focus Form — Center · no nav · no sidebar · minimal footer
  Created  : 2026-03-28
  Surface  : Public (post first-factor, pre-session)
  Repo     :
    auth-service — NO MFA endpoints exist (BG-159):
      No /auth/mfa/verify · no /auth/otp/send · no /auth/totp/setup
      tenant-service DEFAULT_EFFECTIVE_SETTINGS: "security.require_mfa": True
      (config flag present but no enforcement logic or service exists)
    auth-service — No challenge handoff (BG-160):
      POST /api/v1/auth/login has no partial-auth response shape.
      No pending_session_id or challenge_id returned between login steps.
      Expected (not implemented):
        Phase 1: POST /auth/login → { status:"mfa_required", challenge_id, expires_at }
        Phase 2: POST /auth/mfa/verify { challenge_id, code } → LoginResponse (BG-153 shape)
  Gaps     :
    BG-159 — no MFA service or endpoint — full verification flow mocked; code "123456" accepted
    BG-160 — no login→MFA challenge handoff — challenge_id read from URL param (mocked)
  Patterns :
    A12 Single Focus Form · CSS base: lms-a12-register-v1.html (:root verbatim)
    Public surface: no zoom · body:14px · lh:1.6
    Layout: full-viewport flex center · MFA card max-width:400px
    6 individual digit input boxes · auto-advance on digit entry · paste support
    Resend code link (re-triggers mocked POST /auth/mfa/send)
    Back to sign in link
    30-second auto-resend countdown
    Dev state bar: Idle · Loading · Error · Success
  Mock     :
    Correct code: 123456 (any other 6-digit code → error)
    challenge_id: read from ?challenge= URL param, fallback 'chall-mock-001'
    Method: 'email' (mocked — no method selection on this page)
  States   : Idle · Loading · Error · Success
  CSS anchor: lms-a12-register-v1.html
-->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LMS — Verify Your Identity</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ── VERBATIM FOUNDATION — lms-a12-register-v1.html ── */
:root {
  --canvas:#F7F7F5;--white:#FFFFFF;--subtle:#F2F2F0;
  --border:#E8E8E4;--border-s:#D8D8D2;--border-focus:#5B5BD6;
  --ink:#1A1A18;--ink-2:#52524E;--ink-3:#8C8C84;--ink-4:#C0C0B8;
  --accent:#5B5BD6;--accent-lt:#F0F0FF;
  --green:#18794E;--green-bg:rgba(24,121,78,.08);--green-bd:rgba(24,121,78,.15);
  --amber:#92400E;--amber-bg:#FEF9EE;--amber-bd:rgba(146,64,14,.15);
  --red:#C42B1C;--red-bg:rgba(196,43,28,.07);--red-bd:rgba(196,43,28,.14);
  --gold:#78350F;--gold-bg:#FFFBEB;--gold-bd:rgba(245,158,11,.2);
  --font:'Plus Jakarta Sans',system-ui,sans-serif;
  --sh-xs:0 1px 2px rgba(0,0,0,.04);
  --sh-sm:0 2px 8px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --r:14px;--r-sm:8px;--r-pill:999px;
  --pp:28px;--body-size:13px;--lh:1.5;
  --topbar-h:56px;
  --filter-panel-w:240px;
  --card-gap:16px;
  --card-w:420px;
  /* A12 MFA card — narrower than login/register */
  --mfa-card-w:400px;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
body{font-family:var(--font);background:var(--canvas);color:var(--ink);-webkit-font-smoothing:antialiased;font-size:14px;line-height:1.6;min-height:100vh;display:flex;flex-direction:column;}

/* ── A12 SHELL ── */
.a12-shell{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;}

/* ── MFA CARD ── */
.mfa-card{width:100%;max-width:var(--mfa-card-w);background:var(--white);border-radius:var(--r);border:1px solid var(--border);box-shadow:var(--sh-sm);padding:40px;}

/* Logo: 20px 800 */
.lc-logo{font-size:20px;font-weight:800;color:var(--ink);letter-spacing:-0.02em;text-align:center;margin-bottom:20px;}

/* Shield icon */
.mfa-icon{font-size:32px;text-align:center;margin-bottom:12px;line-height:1;}

/* Card title: 22px 700 -0.02em */
.lc-title{font-size:22px;font-weight:700;color:var(--ink);letter-spacing:-0.02em;text-align:center;margin-bottom:6px;}

/* Subtitle: 13px 500 */
.lc-sub{font-size:13px;font-weight:500;color:var(--ink-3);text-align:center;margin-bottom:28px;line-height:1.5;}
.lc-sub strong{color:var(--ink-2);font-weight:700;}

/* ── FORM MESSAGES ── */
.form-msg{border-radius:var(--r-sm);padding:10px 14px;font-size:12px;font-weight:600;margin-bottom:20px;display:none;text-align:center;}
.form-msg.show{display:block;}
.form-msg.error{background:var(--red-bg);border:1px solid var(--red-bd);color:var(--red);}
.form-msg.success{background:var(--green-bg);border:1px solid var(--green-bd);color:var(--green);}

/* ── OTP INPUT ROW ── */
.otp-row{display:flex;gap:10px;justify-content:center;margin-bottom:28px;}
.otp-digit{width:48px;height:56px;border-radius:var(--r-sm);border:1.5px solid var(--border-s);background:var(--white);font-family:var(--font);font-size:22px;font-weight:700;color:var(--ink);text-align:center;outline:none;transition:border-color 150ms,box-shadow 150ms;caret-color:transparent;}
.otp-digit:focus{border-color:var(--border-focus);box-shadow:0 0 0 3px rgba(91,91,214,.1);}
.otp-digit.filled{border-color:var(--border-s);background:var(--subtle);}
.otp-digit.err{border-color:var(--red);background:var(--red-bg);animation:shake 300ms ease;}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}

/* ── PRIMARY BUTTON ── */
.btn-primary{width:100%;padding:11px 16px;border-radius:var(--r-sm);border:none;background:var(--accent);font-family:var(--font);font-size:13px;font-weight:700;color:#fff;cursor:pointer;transition:background 120ms;display:flex;align-items:center;justify-content:center;gap:8px;}
.btn-primary:hover:not(:disabled){background:#4d4dbf;}
.btn-primary:disabled{opacity:.65;cursor:not-allowed;}

/* Spinner */
.spinner{width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin 600ms linear infinite;display:none;flex-shrink:0;}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── RESEND ROW ── */
.resend-row{text-align:center;margin-top:20px;font-size:12px;color:var(--ink-3);}
.resend-link{color:var(--accent);font-weight:700;text-decoration:none;cursor:pointer;background:none;border:none;font-family:var(--font);font-size:12px;padding:0;}
.resend-link:hover{text-decoration:underline;}
.resend-link:disabled{color:var(--ink-4);cursor:not-allowed;text-decoration:none;}
.resend-countdown{font-weight:700;color:var(--ink-2);}

/* ── BACK LINK ── */
.back-row{text-align:center;margin-top:14px;font-size:12px;}
.back-row a{color:var(--ink-3);font-weight:600;text-decoration:none;}
.back-row a:hover{color:var(--ink-2);text-decoration:underline;}

/* ── FOOTER ── */
.a12-footer{text-align:center;font-size:11px;font-weight:500;color:var(--ink-4);padding:20px 0 12px;}
.a12-footer a{color:var(--ink-3);text-decoration:none;}
.a12-footer a:hover{color:var(--ink-2);}

/* ── STATE BAR ── */
.state-bar{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1A1A18;border-radius:var(--r-pill);padding:5px 6px;display:flex;gap:3px;z-index:9999;box-shadow:0 4px 20px rgba(0,0,0,.25);}
.stb{padding:5px 12px;border-radius:var(--r-pill);border:none;font-family:var(--font);font-size:11px;font-weight:700;cursor:pointer;background:transparent;color:rgba(255,255,255,.4);transition:all 150ms;}
.stb.on{background:white;color:#1A1A18;}

/* ── TOAST ── */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1A1A18;color:#fff;padding:10px 20px;border-radius:var(--r-pill);font-size:12px;font-weight:600;opacity:0;transition:opacity 200ms;pointer-events:none;z-index:9998;white-space:nowrap;}
.toast.show{opacity:1;}
</style>
</head>
<body>

<div class="a12-shell">

  <!-- ── MFA CARD ── -->
  <div class="mfa-card">

    <!-- Logo + icon -->
    <div class="lc-logo">◆ LMS</div>
    <div class="mfa-icon">🔐</div>

    <!-- Heading -->
    <div class="lc-title">Verify your identity</div>
    <div class="lc-sub">
      Enter the 6-digit code sent to<br>
      <strong id="mfa-dest">a***@acme.com</strong>
    </div>

    <!-- Form messages -->
    <div class="form-msg error" id="form-error"></div>
    <div class="form-msg success" id="form-success"></div>

    <!-- OTP input
         POST /api/v1/auth/mfa/verify (not implemented — BG-159)
         challenge_id from URL param (BG-160) · correct code: 123456 (mocked) -->
    <div class="otp-row" id="otp-row">
      <input class="otp-digit" id="d0" type="text" inputmode="numeric" maxlength="1" pattern="[0-9]">
      <input class="otp-digit" id="d1" type="text" inputmode="numeric" maxlength="1" pattern="[0-9]">
      <input class="otp-digit" id="d2" type="text" inputmode="numeric" maxlength="1" pattern="[0-9]">
      <input class="otp-digit" id="d3" type="text" inputmode="numeric" maxlength="1" pattern="[0-9]">
      <input class="otp-digit" id="d4" type="text" inputmode="numeric" maxlength="1" pattern="[0-9]">
      <input class="otp-digit" id="d5" type="text" inputmode="numeric" maxlength="1" pattern="[0-9]">
    </div>

    <!-- Verify button -->
    <button class="btn-primary" id="btn-verify" onclick="handleVerify()">
      <span class="spinner" id="btn-spinner"></span>
      <span id="btn-label">Verify</span>
    </button>

    <!-- Resend row -->
    <div class="resend-row">
      Didn't receive a code?&nbsp;
      <button class="resend-link" id="resend-btn" onclick="handleResend()" disabled>
        Resend in <span class="resend-countdown" id="countdown">30</span>s
      </button>
    </div>

    <!-- Back to sign in -->
    <div class="back-row">
      <a href="lms-a12-login-v1.html">&larr; Back to sign in</a>
    </div>

  </div><!-- /mfa-card -->

  <div class="a12-footer">
    &copy; 2026 LMS Enterprise &nbsp;&middot;&nbsp;
    <a href="#">Privacy</a> &nbsp;&middot;&nbsp; <a href="#">Terms</a>
  </div>

</div><!-- /a12-shell -->

<!-- ── STATE BAR ── -->
<div class="state-bar">
  <button class="stb on" onclick="showState('idle')">Idle</button>
  <button class="stb" onclick="showState('loading')">Loading</button>
  <button class="stb" onclick="showState('error')">Error</button>
  <button class="stb" onclick="showState('success')">Success</button>
</div>

<!-- ── TOAST ── -->
<div class="toast" id="toast"></div>

<script>
/* ── INIT ── */
/* BG-160: challenge_id passed via URL param — no server-side session linkage */
const params      = new URLSearchParams(window.location.search);
const CHALLENGE_ID = params.get('challenge') || 'chall-mock-001';
const MOCK_DEST    = params.get('dest')      || 'a***@acme.com';
document.getElementById('mfa-dest').textContent = MOCK_DEST;

/* BG-159: correct code hardcoded — no TOTP/OTP service */
const CORRECT_CODE = '123456';

/* ── OTP INPUT WIRING ── */
const digits = Array.from({length: 6}, (_, i) => document.getElementById('d' + i));

digits.forEach((el, i) => {
  el.addEventListener('keydown', e => {
    if (e.key === 'Backspace') {
      if (el.value) {
        el.value = '';
        el.classList.remove('filled');
      } else if (i > 0) {
        digits[i - 1].focus();
        digits[i - 1].value = '';
        digits[i - 1].classList.remove('filled');
      }
      e.preventDefault();
    }
    if (e.key === 'ArrowLeft' && i > 0)     { e.preventDefault(); digits[i-1].focus(); }
    if (e.key === 'ArrowRight' && i < 5)    { e.preventDefault(); digits[i+1].focus(); }
    if (e.key === 'Enter')                  { handleVerify(); }
  });

  el.addEventListener('input', e => {
    const val = e.target.value.replace(/\D/g, '').slice(-1);
    el.value = val;
    el.classList.toggle('filled', !!val);
    if (val && i < 5) digits[i + 1].focus();
    if (getCode().length === 6) handleVerify();
  });

  el.addEventListener('paste', e => {
    e.preventDefault();
    const pasted = (e.clipboardData || window.clipboardData)
      .getData('text').replace(/\D/g, '').slice(0, 6);
    pasted.split('').forEach((ch, idx) => {
      if (digits[idx]) {
        digits[idx].value = ch;
        digits[idx].classList.add('filled');
      }
    });
    const next = Math.min(pasted.length, 5);
    digits[next].focus();
    if (pasted.length === 6) handleVerify();
  });
});

digits[0].focus();

/* ── GET FULL CODE ── */
function getCode() { return digits.map(d => d.value).join(''); }

/* ── VERIFY HANDLER ── */
function handleVerify() {
  const code = getCode();
  clearMessages();
  clearDigitErrors();

  if (code.length < 6) {
    showError('Please enter all 6 digits.');
    return;
  }

  setLoading(true);

  /* Simulate POST /api/v1/auth/mfa/verify (BG-159 — not implemented)
     { challenge_id: CHALLENGE_ID, code } → { verified: bool, session_id?, access_token? } */
  setTimeout(() => {
    setLoading(false);
    if (code === CORRECT_CODE) {
      /* BG-153: LoginResponse shape mocked */
      const _resp = {
        verified:      true,
        session_id:    'sess-' + Math.random().toString(36).slice(2, 10),
        access_token:  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.mfa_verified',
        refresh_token: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.refresh_mfa',
        expires_in:    3600,
      };
      digits.forEach(d => { d.disabled = true; d.classList.add('filled'); });
      showSuccess('\u2713 Identity verified \u00b7 redirecting\u2026');
      /* In production: store tokens, redirect to dashboard */
    } else {
      digits.forEach(d => d.classList.add('err'));
      setTimeout(() => digits.forEach(d => d.classList.remove('err')), 400);
      showError('Incorrect code. Please try again.');
      resetDigits();
    }
  }, 800);
}

/* ── RESEND ── */
function handleResend() {
  /* Simulate POST /api/v1/auth/mfa/send (BG-159 — not implemented)
     { tenant_id, challenge_id, method: 'email' } */
  showToast('New code sent \u2014 check your email');
  startCountdown(30);
}

/* ── COUNTDOWN TIMER ── */
let countdownTimer = null;
function startCountdown(secs) {
  const btn      = document.getElementById('resend-btn');
  const display  = document.getElementById('countdown');
  btn.disabled   = true;
  let remaining  = secs;
  display.textContent = remaining;
  btn.innerHTML  = 'Resend in <span class="resend-countdown" id="countdown">' + remaining + 's</span>';
  clearInterval(countdownTimer);
  countdownTimer = setInterval(() => {
    remaining -= 1;
    const cd = document.getElementById('countdown');
    if (cd) cd.textContent = remaining + 's';
    if (remaining <= 0) {
      clearInterval(countdownTimer);
      btn.disabled = false;
      btn.textContent = 'Resend code';
    }
  }, 1000);
}

/* ── HELPERS ── */
function resetDigits() {
  digits.forEach(d => { d.value = ''; d.classList.remove('filled','err'); d.disabled = false; });
  digits[0].focus();
}
function clearDigitErrors() { digits.forEach(d => d.classList.remove('err')); }
function setLoading(on) {
  const btn = document.getElementById('btn-verify');
  const sp  = document.getElementById('btn-spinner');
  const lbl = document.getElementById('btn-label');
  btn.disabled     = on;
  sp.style.display = on ? 'block' : 'none';
  lbl.textContent  = on ? 'Verifying\u2026' : 'Verify';
}
function clearMessages() {
  document.getElementById('form-error').classList.remove('show');
  document.getElementById('form-success').classList.remove('show');
}
function showError(msg) {
  const el = document.getElementById('form-error');
  el.textContent = msg; el.classList.add('show');
}
function showSuccess(msg) {
  const el = document.getElementById('form-success');
  el.textContent = msg; el.classList.add('show');
}

/* ── STATE SWITCHER ── */
function showState(s) {
  clearMessages();
  resetDigits();
  setLoading(false);
  if (s === 'loading') { setLoading(true); }
  if (s === 'error')   {
    digits.forEach(d => { d.value = '9'; d.classList.add('filled','err'); });
    showError('Incorrect code. Please try again.');
  }
  if (s === 'success') {
    '123456'.split('').forEach((ch, i) => { digits[i].value = ch; digits[i].classList.add('filled'); digits[i].disabled = true; });
    showSuccess('\u2713 Identity verified \u00b7 redirecting\u2026');
  }
  document.querySelectorAll('.stb').forEach(b =>
    b.classList.toggle('on', b.textContent.toLowerCase() === s)
  );
}

/* ── TOAST ── */
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2600);
}

/* ── START INITIAL COUNTDOWN ── */
startCountdown(30);
</script>
</body>
</html>
