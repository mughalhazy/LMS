<!DOCTYPE html>
<html lang="en">
<head>
<!--
  Page     : Course Player
  Archetype: A7 Player — Split variant (4-zone)
  Created  : 2026-03-22
  Surface  : Learner
  Repo     : lesson-service (full) · progress-service (full) · scorm-service (stub — BG-126)
  Zones    : Outline Panel (260px fixed) · Content Zone (flex-1) · Notes Panel (280px fixed) · Rail (56px bottom)
  Endpoints: GET  /api/v1/lessons?course_id=              → LessonListResponse
             GET  /api/v1/lessons/{id}                    → LessonResponse
             POST /api/v1/lessons/{id}:delivery-state     → update resume position (BG-127 — schema undefined)
             POST /api/v1/lessons/{id}:progression-hooks  → completion hook
             POST /api/v1/progress/lessons/{id}/upsert    → upsert lesson progress
             POST /api/v1/progress/lessons/{id}/complete  → complete lesson
             GET  /api/v1/progress/learners/{id}          → LearnerProgressSummaryResponse
  Gaps     : BG-126 (scorm-service full stub — SCORM mode shows placeholder)
             BG-127 (delivery_state dict[str,Any] — no schema; resume state written with best-guess shape)
             BG-121 (delivery_state — extends; player-relevant shape undefined)
  Patterns : A7 Split — 4-zone layout: Outline (260px) + Content (flex-1) + Notes (280px) + Rail (56px)
             zoom:1.25 · Learner surface
             Lesson types: self_paced (video) · document · assessment · live_session
             Progress dots: not_started(grey) · in_progress(amber) · completed(green)
             P-55 inline error block · P-56 partial skeleton
  CSS base : Verbatim :root + shared components from lms-a6-learning-path-builder-v1.html (last sealed)
-->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LMS — Course Player</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ── VERBATIM FOUNDATION — lms-a6-learning-path-builder-v1.html (last sealed) ── */
:root {
  --canvas:#F7F7F5;--white:#FFFFFF;--subtle:#F2F2F0;
  --border:#E8E8E4;--border-s:#D8D8D2;--border-focus:#5B5BD6;
  --ink:#1A1A18;--ink-2:#52524E;--ink-3:#8C8C84;--ink-4:#C0C0B8;
  --accent:#5B5BD6;--accent-lt:#F0F0FF;
  --green:#18794E;--green-bg:rgba(24,121,78,.08);--green-bd:rgba(24,121,78,.15);
  --amber:#92400E;--amber-bg:#FEF9EE;--amber-bd:rgba(146,64,14,.15);
  --red:#C42B1C;--red-bg:rgba(196,43,28,.07);--red-bd:rgba(196,43,28,.14);
  --teal:#0D9488;--teal-bg:rgba(13,148,136,.07);--teal-bd:rgba(13,148,136,.15);
  --font:'Plus Jakarta Sans',system-ui,sans-serif;
  --sh-xs:0 1px 2px rgba(0,0,0,.04);
  --sh-sm:0 2px 8px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --r:14px;--r-sm:8px;--r-pill:999px;
  --pp:28px;--body-size:14px;--lh:1.5;
  --action-bar-h:64px;
}
html{zoom:1.25;}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
body{font-family:var(--font);background:var(--canvas);color:var(--ink);-webkit-font-smoothing:antialiased;font-size:var(--body-size);line-height:var(--lh);}
.sk{background:linear-gradient(90deg,#F2F2F0 25%,#E8E8E4 50%,#F2F2F0 75%);background-size:400% 100%;animation:shimmer 1400ms ease-in-out infinite;border-radius:4px;}
@keyframes shimmer{0%{background-position:100% 0}100%{background-position:-100% 0}}
.state-bar{position:fixed;bottom:72px;left:50%;transform:translateX(-50%);background:#1A1A18;border-radius:999px;padding:5px 6px;display:flex;gap:3px;z-index:9999;box-shadow:0 4px 20px rgba(0,0,0,.25);}
.stb{padding:5px 12px;border-radius:999px;border:none;font-family:var(--font);font-size:11px;font-weight:700;cursor:pointer;background:transparent;color:rgba(255,255,255,.4);transition:all 150ms;}
.stb.on{background:white;color:#1A1A18;}
.btn-g{padding:8px 16px;border-radius:var(--r-sm);font-family:var(--font);font-size:13px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--white);color:var(--ink-2);transition:all 100ms;white-space:nowrap;}
.btn-g:hover{border-color:var(--border-s);color:var(--ink);}
.btn-primary{padding:8px 20px;border-radius:var(--r-sm);font-family:var(--font);font-size:13px;font-weight:600;cursor:pointer;border:none;background:var(--accent);color:white;transition:all 100ms;white-space:nowrap;}
.btn-primary:hover{opacity:.9;}
.btn-primary:disabled{opacity:.45;cursor:not-allowed;}
.btn-success{padding:8px 20px;border-radius:var(--r-sm);font-family:var(--font);font-size:13px;font-weight:600;cursor:pointer;border:none;background:var(--green);color:white;transition:all 100ms;white-space:nowrap;}
.btn-success:hover{opacity:.9;}
.btn-success:disabled{opacity:.45;cursor:not-allowed;}

/* ── A7 PLAYER LAYOUT ── */
.layout{display:flex;flex-direction:column;height:100vh;overflow:hidden;min-width:960px;}

/* Topbar */
.topbar{height:52px;background:var(--white);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;flex-shrink:0;gap:10px;z-index:20;}
.tb-back{font-size:13px;color:var(--ink-3);font-weight:500;cursor:pointer;padding:4px 8px;border-radius:6px;transition:all 100ms;display:flex;align-items:center;gap:5px;white-space:nowrap;}
.tb-back:hover{background:var(--subtle);color:var(--ink-2);}
.tb-sep{color:var(--ink-4);font-size:13px;}
.tb-course{font-size:14px;font-weight:700;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:240px;}
.tb-lesson{font-size:13px;font-weight:500;color:var(--ink-3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0;}
.tb-r{margin-left:auto;display:flex;align-items:center;gap:10px;flex-shrink:0;}
.tb-progress-wrap{display:flex;align-items:center;gap:8px;}
.tb-progress-label{font-size:12px;color:var(--ink-3);white-space:nowrap;}
.tb-progress-bar{width:120px;height:5px;background:var(--border);border-radius:999px;overflow:hidden;}
.tb-progress-fill{height:100%;background:var(--accent);border-radius:999px;transition:width 300ms;}
.tb-icon-btn{width:32px;height:32px;border-radius:6px;border:1px solid var(--border);background:var(--white);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;color:var(--ink-3);transition:all 100ms;}
.tb-icon-btn:hover{background:var(--subtle);color:var(--ink);}

/* Player body */
.player-body{display:flex;flex:1;overflow:hidden;}

/* ── ZONE 1 — OUTLINE PANEL (260px) ── */
.outline-panel{width:260px;flex-shrink:0;background:var(--white);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.op-header{padding:14px 16px 12px;border-bottom:1px solid var(--border);flex-shrink:0;}
.op-course-title{font-size:13px;font-weight:700;color:var(--ink);line-height:1.3;margin-bottom:6px;}
.op-meta{display:flex;align-items:center;gap:8px;}
.op-meta-item{font-size:11px;color:var(--ink-4);}
.op-overall-progress{margin-top:8px;}
.op-prog-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;}
.op-prog-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-4);}
.op-prog-pct{font-size:11px;font-weight:700;color:var(--accent);}
.op-prog-bar{height:4px;background:var(--border);border-radius:999px;overflow:hidden;}
.op-prog-fill{height:100%;background:var(--accent);border-radius:999px;transition:width 300ms;}
.op-scroll{flex:1;overflow-y:auto;padding:6px 0;}

/* Lesson row */
.lesson-row{display:flex;align-items:flex-start;gap:10px;padding:9px 14px;cursor:pointer;transition:background 100ms;border-bottom:1px solid var(--border);}
.lesson-row:last-child{border-bottom:none;}
.lesson-row:hover{background:var(--subtle);}
.lesson-row.active{background:var(--accent-lt);}
.lesson-row.active .lr-title{color:var(--accent);font-weight:700;}
.lr-status-icon{width:18px;height:18px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;margin-top:2px;}
.lr-status-icon.completed{background:var(--green-bg);border:1px solid var(--green-bd);color:var(--green);}
.lr-status-icon.in_progress{background:var(--amber-bg);border:1px solid var(--amber-bd);color:var(--amber);}
.lr-status-icon.not_started{background:var(--subtle);border:1px solid var(--border);color:var(--ink-4);}
.lr-body{flex:1;min-width:0;}
.lr-title{font-size:12px;color:var(--ink-2);line-height:1.4;margin-bottom:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.lr-meta{display:flex;align-items:center;gap:6px;}
.lr-type{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--ink-4);}
.lr-dur{font-size:10px;color:var(--ink-4);}

/* ── ZONE 2 — CONTENT ZONE (flex-1) ── */
.content-zone{flex:1;display:flex;flex-direction:column;overflow:hidden;background:#0F0F0F;position:relative;}

/* Lesson header bar */
.content-header{background:#1A1A18;padding:10px 20px;display:flex;align-items:center;gap:10px;flex-shrink:0;}
.ch-title{font-size:14px;font-weight:700;color:white;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.ch-type-badge{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;padding:2px 7px;border-radius:3px;flex-shrink:0;}
.ch-type-badge.sp{background:rgba(13,148,136,.25);color:#5EEAD4;}
.ch-type-badge.as{background:rgba(217,119,6,.2);color:#FCD34D;}
.ch-type-badge.live{background:rgba(91,91,214,.25);color:#A5B4FC;}

/* Video player */
.video-player{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.video-frame{flex:1;background:#000;display:flex;align-items:center;justify-content:center;position:relative;}
.video-thumb{width:100%;height:100%;object-fit:cover;opacity:.12;}
.video-play-btn{position:absolute;width:64px;height:64px;border-radius:50%;background:rgba(255,255,255,.15);border:2px solid rgba(255,255,255,.3);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 150ms;backdrop-filter:blur(4px);}
.video-play-btn:hover{background:rgba(255,255,255,.25);transform:scale(1.06);}
.video-play-icon{font-size:22px;color:white;margin-left:4px;}
.video-controls{background:#1A1A18;padding:10px 20px;display:flex;align-items:center;gap:12px;flex-shrink:0;}
.vc-time{font-size:12px;color:rgba(255,255,255,.6);white-space:nowrap;font-family:monospace;}
.vc-progress{flex:1;height:4px;background:rgba(255,255,255,.15);border-radius:999px;cursor:pointer;position:relative;}
.vc-fill{height:100%;background:var(--accent);border-radius:999px;width:38%;}
.vc-thumb{position:absolute;top:50%;transform:translateY(-50%);width:12px;height:12px;border-radius:50%;background:white;left:38%;margin-left:-6px;box-shadow:0 1px 4px rgba(0,0,0,.4);}
.vc-btn{width:28px;height:28px;border-radius:4px;border:none;background:none;color:rgba(255,255,255,.7);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all 100ms;}
.vc-btn:hover{background:rgba(255,255,255,.1);color:white;}
.vc-volume{width:60px;height:4px;background:rgba(255,255,255,.15);border-radius:999px;}
.vc-vol-fill{height:100%;background:rgba(255,255,255,.6);border-radius:999px;width:70%;}
.vc-quality{font-size:11px;color:rgba(255,255,255,.5);padding:2px 6px;border-radius:3px;border:1px solid rgba(255,255,255,.15);cursor:pointer;}

/* Document viewer */
.doc-viewer{flex:1;display:flex;flex-direction:column;overflow:hidden;background:#525659;}
.doc-toolbar{background:#3D4043;padding:8px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0;}
.doc-tb-btn{padding:4px 10px;border-radius:4px;font-family:var(--font);font-size:12px;font-weight:600;cursor:pointer;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.08);color:rgba(255,255,255,.8);transition:all 100ms;}
.doc-tb-btn:hover{background:rgba(255,255,255,.15);}
.doc-page-nav{display:flex;align-items:center;gap:8px;margin:0 auto;}
.doc-page-input{width:40px;text-align:center;font-family:var(--font);font-size:12px;padding:3px 6px;border-radius:4px;border:1px solid rgba(255,255,255,.2);background:rgba(0,0,0,.3);color:white;}
.doc-page-label{font-size:12px;color:rgba(255,255,255,.5);}
.doc-content{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;align-items:center;gap:12px;}
.doc-page{background:white;width:100%;max-width:700px;aspect-ratio:0.77;border-radius:2px;box-shadow:0 4px 20px rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;}
.doc-page-placeholder{text-align:center;}
.dpp-icon{font-size:40px;opacity:.2;margin-bottom:10px;}
.dpp-label{font-size:13px;color:var(--ink-3);}

/* SCORM placeholder (BG-126) */
.scorm-placeholder{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;padding:40px;}
.sp-icon{font-size:48px;opacity:.3;}
.sp-title{font-size:15px;font-weight:700;color:rgba(255,255,255,.6);}
.sp-sub{font-size:13px;color:rgba(255,255,255,.3);text-align:center;max-width:320px;line-height:1.6;}

/* Empty / Error in content zone */
.content-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px;background:var(--canvas);}
.ce-icon{font-size:40px;opacity:.3;margin-bottom:14px;}
.ce-title{font-size:14px;font-weight:700;color:var(--ink);margin-bottom:6px;}
.ce-sub{font-size:13px;color:var(--ink-3);max-width:320px;line-height:1.6;}
.err-block{background:var(--red-bg);border:1px solid var(--red-bd);border-radius:var(--r);padding:20px;display:flex;gap:14px;align-items:flex-start;margin:20px;}
.err-icon{font-size:18px;flex-shrink:0;margin-top:1px;}
.err-title{font-size:14px;font-weight:700;color:var(--red);margin-bottom:4px;}
.err-msg{font-size:13px;color:var(--red);opacity:.85;line-height:1.5;}
.err-retry{margin-top:12px;padding:6px 14px;border-radius:var(--r-sm);font-family:var(--font);font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--red-bd);background:var(--white);color:var(--red);transition:all 100ms;}
.err-retry:hover{background:var(--red-bg);}

/* ── ZONE 3 — NOTES PANEL (280px) ── */
.notes-panel{width:280px;flex-shrink:0;background:var(--white);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.np-header{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.np-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--ink-3);}
.np-timestamp{font-size:10px;color:var(--ink-4);}
.np-tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0;}
.np-tab{flex:1;padding:8px 0;font-size:12px;font-weight:600;color:var(--ink-3);text-align:center;cursor:pointer;border-bottom:2px solid transparent;transition:all 100ms;}
.np-tab.active{color:var(--accent);border-bottom-color:var(--accent);}
.np-body{flex:1;overflow:hidden;display:flex;flex-direction:column;}
/* Notes tab */
.notes-compose{padding:14px;border-bottom:1px solid var(--border);flex-shrink:0;}
.notes-textarea{font-family:var(--font);font-size:13px;color:var(--ink);background:var(--subtle);border:1px solid var(--border);border-radius:var(--r-sm);padding:10px;outline:none;width:100%;resize:none;height:80px;line-height:1.5;transition:border-color 120ms;}
.notes-textarea:focus{border-color:var(--border-focus);box-shadow:0 0 0 3px rgba(91,91,214,.08);background:var(--white);}
.notes-actions{display:flex;justify-content:flex-end;margin-top:8px;}
.notes-save-btn{padding:5px 14px;border-radius:var(--r-sm);font-family:var(--font);font-size:12px;font-weight:600;cursor:pointer;border:none;background:var(--accent);color:white;transition:all 100ms;}
.notes-save-btn:hover{opacity:.9;}
.notes-list{flex:1;overflow-y:auto;padding:8px 0;}
.note-item{padding:10px 14px;border-bottom:1px solid var(--border);}
.note-item:last-child{border-bottom:none;}
.note-timestamp{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-4);margin-bottom:4px;}
.note-text{font-size:12px;color:var(--ink-2);line-height:1.5;}
/* Objectives tab */
.obj-list-panel{padding:14px;display:flex;flex-direction:column;gap:8px;overflow-y:auto;flex:1;}
.obj-item-row{display:flex;align-items:flex-start;gap:8px;}
.obj-check{width:16px;height:16px;border-radius:3px;border:2px solid var(--border);flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.obj-check.done{background:var(--green);border-color:var(--green);color:white;font-size:9px;}
.obj-text{font-size:12px;color:var(--ink-2);line-height:1.5;}

/* ── ZONE 4 — RAIL (56px bottom) ── */
.rail{height:56px;background:var(--white);border-top:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:12px;flex-shrink:0;z-index:10;}
.rail-prev{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:600;color:var(--ink-3);cursor:pointer;padding:6px 12px;border-radius:var(--r-sm);border:1px solid var(--border);background:var(--white);transition:all 100ms;font-family:var(--font);}
.rail-prev:hover{color:var(--ink);border-color:var(--border-s);}
.rail-prev:disabled{opacity:.35;cursor:not-allowed;}
.rail-progress-wrap{flex:1;display:flex;flex-direction:column;gap:4px;}
.rail-progress-label{display:flex;justify-content:space-between;align-items:center;}
.rpl-left{font-size:11px;color:var(--ink-3);}
.rpl-right{font-size:11px;font-weight:700;color:var(--accent);}
.rail-progress-bar{height:5px;background:var(--border);border-radius:999px;overflow:hidden;}
.rail-progress-fill{height:100%;background:var(--accent);border-radius:999px;transition:width 400ms;}
.rail-next{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:600;color:var(--ink-2);cursor:pointer;padding:6px 14px;border-radius:var(--r-sm);border:1px solid var(--border);background:var(--white);transition:all 100ms;font-family:var(--font);}
.rail-next:hover{color:var(--ink);border-color:var(--border-s);}
.rail-complete-btn{padding:8px 18px;border-radius:var(--r-sm);font-family:var(--font);font-size:13px;font-weight:600;cursor:pointer;border:none;background:var(--green);color:white;transition:all 100ms;white-space:nowrap;display:flex;align-items:center;gap:6px;}
.rail-complete-btn:hover{opacity:.9;}
.rail-complete-btn.done{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bd);}
</style>
</head>
<body>
<div class="layout">

  <!-- TOPBAR -->
  <div class="topbar">
    <div class="tb-back" onclick="history.back()">← Back to Course</div>
    <span class="tb-sep">›</span>
    <span class="tb-course" id="tb-course-name">Security Fundamentals</span>
    <span class="tb-sep" style="flex-shrink:0;">›</span>
    <span class="tb-lesson" id="tb-lesson-name">Authentication Methods</span>
    <div class="tb-r">
      <div class="tb-progress-wrap">
        <span class="tb-progress-label" id="tb-prog-label">2 of 5 complete</span>
        <div class="tb-progress-bar"><div class="tb-progress-fill" id="tb-prog-fill" style="width:40%"></div></div>
      </div>
      <div class="tb-icon-btn" title="Bookmark" onclick="handleBookmark()">🔖</div>
      <div class="tb-icon-btn" title="Fullscreen" onclick="handleFullscreen()">⛶</div>
    </div>
  </div>

  <!-- PLAYER BODY -->
  <div class="player-body">

    <!-- ZONE 1 — OUTLINE PANEL -->
    <div class="outline-panel">
      <div class="op-header">
        <div class="op-course-title" id="op-course-title">Security Fundamentals</div>
        <div class="op-meta">
          <span class="op-meta-item" id="op-lesson-count">5 lessons</span>
          <span class="op-meta-item">·</span>
          <span class="op-meta-item" id="op-total-dur">150 min</span>
        </div>
        <div class="op-overall-progress">
          <div class="op-prog-row">
            <span class="op-prog-label">Progress</span>
            <span class="op-prog-pct" id="op-prog-pct">40%</span>
          </div>
          <div class="op-prog-bar"><div class="op-prog-fill" id="op-prog-fill" style="width:40%"></div></div>
        </div>
      </div>
      <div class="op-scroll" id="op-scroll"></div>
    </div>

    <!-- ZONE 2 — CONTENT ZONE -->
    <div class="content-zone" id="content-zone"></div>

    <!-- ZONE 3 — NOTES PANEL -->
    <div class="notes-panel">
      <div class="np-header">
        <span class="np-title">Notes</span>
        <span class="np-timestamp" id="np-timestamp"></span>
      </div>
      <div class="np-tabs">
        <div class="np-tab active" id="tab-notes" onclick="switchTab('notes')">My Notes</div>
        <div class="np-tab" id="tab-objectives" onclick="switchTab('objectives')">Objectives</div>
      </div>
      <div class="np-body" id="np-body"></div>
    </div>

  </div>

  <!-- ZONE 4 — RAIL -->
  <div class="rail" id="rail">
    <button class="rail-prev" id="rail-prev" onclick="handlePrev()">← Previous</button>
    <div class="rail-progress-wrap">
      <div class="rail-progress-label">
        <span class="rpl-left" id="rail-prog-left">Lesson 3 of 5</span>
        <span class="rpl-right" id="rail-prog-right">40% complete</span>
      </div>
      <div class="rail-progress-bar"><div class="rail-progress-fill" id="rail-prog-fill" style="width:40%"></div></div>
    </div>
    <button class="rail-next" id="rail-next" onclick="handleNext()">Next →</button>
    <button class="rail-complete-btn" id="rail-complete" onclick="handleComplete()">✓ Mark Complete</button>
  </div>

  <!-- STATE BAR — offset above rail -->
  <div class="state-bar">
    <button class="stb on"  onclick="setState('loaded',this)">Loaded</button>
    <button class="stb"     onclick="setState('skeleton',this)">Skeleton</button>
    <button class="stb"     onclick="setState('empty',this)">Empty</button>
    <button class="stb"     onclick="setState('error',this)">Error</button>
  </div>
</div>

<script>
/* ── MOCK DATA (lesson-service) ── */
const COURSE = {
  course_id: 'c002', title: 'Security Fundamentals', course_code: 'SEC-101',
  delivery_mode: 'self_paced', status: 'published'
};

/* Lessons shaped to LessonResponse — lesson_type is untyped str (BG-117) */
const LESSONS = [
  { lesson_id:'ls-001', course_id:'c002', module_id:'mod-intro',  title:'What is Security?',
    lesson_type:'self_paced', status:'published', order_index:0, estimated_duration_minutes:15,
    learning_objectives:['Define information security','Identify key security principles'],
    content_ref:'cnt-001',
    /* progress-service fields */
    progress_status:'completed', completion_pct:100 },
  { lesson_id:'ls-002', course_id:'c002', module_id:'mod-intro',  title:'Threat Landscape Overview',
    lesson_type:'self_paced', status:'published', order_index:1, estimated_duration_minutes:20,
    learning_objectives:['Identify common threat categories','Understand attack vectors'],
    content_ref:'cnt-002',
    progress_status:'completed', completion_pct:100 },
  { lesson_id:'ls-003', course_id:'c002', module_id:'mod-core',   title:'Authentication Methods',
    lesson_type:'self_paced', status:'published', order_index:2, estimated_duration_minutes:25,
    learning_objectives:['Compare authentication factors','Evaluate MFA approaches','Implement password policy'],
    content_ref:'cnt-003',
    progress_status:'in_progress', completion_pct:38 },
  { lesson_id:'ls-004', course_id:'c002', module_id:'mod-core',   title:'Live Q&A: Security Basics',
    lesson_type:'live_session', status:'published', order_index:3, estimated_duration_minutes:60,
    learning_objectives:[],
    content_ref:null,
    progress_status:'not_started', completion_pct:0 },
  { lesson_id:'ls-005', course_id:'c002', module_id:'mod-assess', title:'Security Fundamentals Quiz',
    lesson_type:'assessment', status:'published', order_index:4, estimated_duration_minutes:30,
    learning_objectives:['Demonstrate knowledge of security concepts'],
    content_ref:null,
    progress_status:'not_started', completion_pct:0 }
];

/* Saved notes (client-side) */
const SAVED_NOTES = [
  { timestamp:'09:12', text:'MFA factors: something you know, have, are. FIDO2 hardware key is strongest.' },
  { timestamp:'07:45', text:'Password policy: min 12 chars, complexity required, 90-day rotation.' }
];

const TYPE_LABEL = { self_paced:'Self-Paced', live_session:'Live Session', assessment:'Assessment' };
const STATUS_ICON = { completed:'✓', in_progress:'▶', not_started:'' };

/* ── STATE ── */
let currentState    = 'loaded';
let activeLesson    = LESSONS[2]; /* ls-003 */
let activeTab       = 'notes';
let completedIds    = new Set(['ls-001','ls-002']);

/* ── HELPERS ── */
function overallPct(){
  return Math.round((completedIds.size / LESSONS.length) * 100);
}
function lessonIndex(l){ return LESSONS.findIndex(x => x.lesson_id === l.lesson_id); }
function prevLesson(){ const i = lessonIndex(activeLesson); return i > 0 ? LESSONS[i-1] : null; }
function nextLesson(){ const i = lessonIndex(activeLesson); return i < LESSONS.length-1 ? LESSONS[i+1] : null; }

/* ── STATE SWITCHER ── */
function setState(s, btn){
  currentState = s;
  document.querySelectorAll('.stb').forEach(b => b.classList.remove('on'));
  if(btn) btn.classList.add('on');
  render();
}

/* ── RENDER ── */
function render(){
  renderOutline();
  renderContent();
  renderNotes();
  renderRail();
  renderTopbar();
}

/* ── TOPBAR ── */
function renderTopbar(){
  if(currentState !== 'loaded') return;
  document.getElementById('tb-lesson-name').textContent = activeLesson.title;
  const pct = overallPct();
  document.getElementById('tb-prog-label').textContent =
    `${completedIds.size} of ${LESSONS.length} complete`;
  document.getElementById('tb-prog-fill').style.width = pct + '%';
}

/* ── OUTLINE ── */
function renderOutline(){
  const scroll = document.getElementById('op-scroll');

  if(currentState === 'skeleton'){
    scroll.innerHTML = LESSONS.map((_,i) => `
      <div style="display:flex;align-items:center;gap:10px;padding:9px 14px;border-bottom:1px solid var(--border);">
        <div class="sk" style="width:18px;height:18px;border-radius:50%;flex-shrink:0;"></div>
        <div style="flex:1;display:flex;flex-direction:column;gap:4px;">
          <div class="sk" style="height:12px;width:${60+i*8}%;"></div>
          <div class="sk" style="height:10px;width:40%;"></div>
        </div>
      </div>`).join('');
    return;
  }

  if(currentState === 'empty' || currentState === 'error'){
    scroll.innerHTML = '';
    return;
  }

  const pct = overallPct();
  document.getElementById('op-prog-pct').textContent = pct + '%';
  document.getElementById('op-prog-fill').style.width = pct + '%';

  scroll.innerHTML = LESSONS.map(l => {
    const status = completedIds.has(l.lesson_id) ? 'completed'
                 : l.lesson_id === activeLesson.lesson_id ? 'in_progress'
                 : 'not_started';
    const isActive = l.lesson_id === activeLesson.lesson_id;
    return `
      <div class="lesson-row${isActive?' active':''}" onclick="selectLesson('${l.lesson_id}')">
        <div class="lr-status-icon ${status}">${STATUS_ICON[status]}</div>
        <div class="lr-body">
          <div class="lr-title">${l.title}</div>
          <div class="lr-meta">
            <span class="lr-type">${TYPE_LABEL[l.lesson_type]||l.lesson_type}</span>
            ${l.estimated_duration_minutes ? `<span class="lr-dur">· ${l.estimated_duration_minutes} min</span>` : ''}
          </div>
        </div>
      </div>`;
  }).join('');
}

/* ── CONTENT ZONE ── */
function renderContent(){
  const zone = document.getElementById('content-zone');

  if(currentState === 'skeleton'){
    zone.style.background = '#1A1A18';
    zone.innerHTML = `
      <div style="padding:16px 20px;background:#1A1A18;border-bottom:1px solid #333;">
        <div class="sk" style="height:14px;width:200px;background:rgba(255,255,255,.08);"></div>
      </div>
      <div style="flex:1;display:flex;align-items:center;justify-content:center;">
        <div class="sk" style="width:72px;height:72px;border-radius:50%;background:rgba(255,255,255,.06);"></div>
      </div>
      <div style="padding:12px 20px;background:#1A1A18;display:flex;gap:12px;align-items:center;">
        <div class="sk" style="height:4px;flex:1;background:rgba(255,255,255,.08);border-radius:999px;"></div>
      </div>`;
    return;
  }

  if(currentState === 'empty'){
    zone.style.background = 'var(--canvas)';
    zone.innerHTML = `
      <div class="content-empty">
        <div class="ce-icon">📭</div>
        <div class="ce-title">No lessons in this course</div>
        <div class="ce-sub">There are no published lessons available yet. Check back later or contact your instructor.</div>
      </div>`;
    return;
  }

  if(currentState === 'error'){
    zone.style.background = 'var(--canvas)';
    zone.innerHTML = `
      <div class="err-block" style="margin:40px auto;max-width:480px;">
        <span class="err-icon">⚠</span>
        <div>
          <div class="err-title">Failed to load lesson</div>
          <div class="err-msg">Could not retrieve lesson content. Check your connection and try again.</div>
          <button class="err-retry" onclick="setState('loaded',null);document.querySelectorAll('.stb')[0].classList.add('on')">Retry</button>
        </div>
      </div>`;
    return;
  }

  /* Loaded — render based on lesson_type */
  zone.style.background = '#0F0F0F';
  const typeClass = { self_paced:'sp', live_session:'live', assessment:'as' };
  const headerHtml = `
    <div class="content-header">
      <span class="ch-title">${activeLesson.title}</span>
      <span class="ch-type-badge ${typeClass[activeLesson.lesson_type]||'sp'}">${TYPE_LABEL[activeLesson.lesson_type]||activeLesson.lesson_type}</span>
    </div>`;

  if(activeLesson.lesson_type === 'self_paced'){
    zone.innerHTML = headerHtml + `
      <div class="video-player">
        <div class="video-frame">
          <div class="video-play-btn" onclick="handlePlay()">
            <span class="video-play-icon">▶</span>
          </div>
        </div>
        <div class="video-controls">
          <button class="vc-btn" title="Play/Pause">▶</button>
          <span class="vc-time">09:38 / 25:00</span>
          <div class="vc-progress">
            <div class="vc-fill"></div>
            <div class="vc-thumb"></div>
          </div>
          <button class="vc-btn" title="Volume">🔊</button>
          <div class="vc-volume"><div class="vc-vol-fill"></div></div>
          <span class="vc-quality">720p</span>
          <button class="vc-btn" title="Fullscreen">⛶</button>
        </div>
      </div>`;

  } else if(activeLesson.lesson_type === 'assessment'){
    zone.innerHTML = headerHtml + `
      <div style="flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;padding:40px;">
        <div style="font-size:48px;opacity:.4;">📝</div>
        <div style="font-size:16px;font-weight:700;color:rgba(255,255,255,.7);">Ready to begin the quiz?</div>
        <div style="font-size:13px;color:rgba(255,255,255,.4);text-align:center;max-width:300px;line-height:1.6;">
          This assessment is graded. Make sure you have read all course materials before starting.
        </div>
        <button class="btn-primary" style="margin-top:8px;" onclick="handleStartAssessment()">Start Assessment</button>
      </div>`;

  } else if(activeLesson.lesson_type === 'live_session'){
    zone.innerHTML = headerHtml + `
      <div style="flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;padding:40px;">
        <div style="font-size:48px;opacity:.4;">📡</div>
        <div style="font-size:16px;font-weight:700;color:rgba(255,255,255,.7);">Live Session</div>
        <div style="font-size:13px;color:rgba(255,255,255,.4);text-align:center;max-width:300px;line-height:1.6;">
          This is a scheduled live session. Join when your instructor starts the session.
        </div>
        <button class="btn-primary" style="opacity:.45;cursor:not-allowed;" disabled>Session Not Yet Started</button>
      </div>`;
  }
}

/* ── NOTES PANEL ── */
function renderNotes(){
  const body = document.getElementById('np-body');
  document.getElementById('np-timestamp').textContent =
    currentState === 'loaded' ? new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}) : '';

  if(currentState !== 'loaded'){
    body.innerHTML = '';
    return;
  }

  if(activeTab === 'notes'){
    body.innerHTML = `
      <div class="notes-compose">
        <textarea class="notes-textarea" placeholder="Add a note for this lesson…"></textarea>
        <div class="notes-actions">
          <button class="notes-save-btn" onclick="handleSaveNote()">Save Note</button>
        </div>
      </div>
      <div class="notes-list">
        ${SAVED_NOTES.map(n => `
          <div class="note-item">
            <div class="note-timestamp">${n.timestamp}</div>
            <div class="note-text">${n.text}</div>
          </div>`).join('')}
      </div>`;
  } else {
    const objectives = activeLesson.learning_objectives;
    body.innerHTML = objectives.length ? `
      <div class="obj-list-panel">
        ${objectives.map((obj, i) => `
          <div class="obj-item-row">
            <div class="obj-check${i===0?' done':''}">
              ${i===0?'✓':''}
            </div>
            <div class="obj-text">${obj}</div>
          </div>`).join('')}
      </div>` : `
      <div style="padding:30px 16px;text-align:center;">
        <div style="font-size:24px;opacity:.25;margin-bottom:8px;">📋</div>
        <div style="font-size:12px;color:var(--ink-4);">No objectives defined for this lesson.</div>
      </div>`;
  }
}

/* ── RAIL ── */
function renderRail(){
  const prev = prevLesson();
  const next = nextLesson();
  const isDone = completedIds.has(activeLesson?.lesson_id);
  const pct = overallPct();

  document.getElementById('rail-prev').disabled = !prev || currentState !== 'loaded';
  document.getElementById('rail-next').style.opacity = (!next || currentState !== 'loaded') ? '.35' : '1';
  document.getElementById('rail-next').style.cursor = (!next || currentState !== 'loaded') ? 'not-allowed' : 'pointer';

  if(currentState === 'loaded'){
    const idx = lessonIndex(activeLesson);
    document.getElementById('rail-prog-left').textContent = `Lesson ${idx+1} of ${LESSONS.length}`;
    document.getElementById('rail-prog-right').textContent = pct + '% complete';
    document.getElementById('rail-prog-fill').style.width = pct + '%';

    const btn = document.getElementById('rail-complete');
    if(isDone){
      btn.textContent = '✓ Completed';
      btn.classList.add('done');
    } else {
      btn.textContent = '✓ Mark Complete';
      btn.classList.remove('done');
    }
  }
}

/* ── INTERACTIONS ── */
function selectLesson(id){
  if(currentState !== 'loaded') return;
  activeLesson = LESSONS.find(l => l.lesson_id === id);
  activeTab = 'notes';
  render();
}

function handlePrev(){
  const l = prevLesson();
  if(l) selectLesson(l.lesson_id);
}

function handleNext(){
  const l = nextLesson();
  if(l) selectLesson(l.lesson_id);
}

function handleComplete(){
  if(currentState !== 'loaded') return;
  /* POST /api/v1/progress/lessons/{id}/complete + POST /api/v1/lessons/{id}:progression-hooks */
  const id = activeLesson.lesson_id;
  if(completedIds.has(id)){
    completedIds.delete(id);
  } else {
    completedIds.add(id);
  }
  render();
}

function handlePlay(){ /* stub — video playback */ }
function handleBookmark(){ /* stub */ }
function handleFullscreen(){ /* stub */ }
function handleStartAssessment(){ /* stub — navigates to Assessment Player */ }
function handleSaveNote(){ /* stub */ }

function switchTab(tab){
  activeTab = tab;
  document.getElementById('tab-notes').classList.toggle('active', tab==='notes');
  document.getElementById('tab-objectives').classList.toggle('active', tab==='objectives');
  renderNotes();
}

/* ── INIT ── */
render();
</script>
</body>
</html>
