<!DOCTYPE html>
<html lang="en">
<head>
<!--
  Page     : Lesson Player (standalone)
  Archetype: A7 Player — Split variant (4-zone)
  Created  : 2026-03-23
  Surface  : Learner
  Repo     : lesson-service (full) · content-service (upload-only) · progress-service (full)
  Zones    : Lesson Info Panel (260px fixed) · Content Zone (flex-1) · Notes Panel (280px fixed) · Rail (56px)
  Endpoints: GET  /api/v1/lessons/{lesson_id}                → LessonResponse
             POST /api/v1/lessons/{lesson_id}:delivery-state → update resume position (BG-127)
             POST /api/v1/lessons/{lesson_id}:progression-hooks → completion hook
             POST /api/v1/progress/lessons/{lesson_id}/upsert → upsert lesson progress
             POST /api/v1/progress/lessons/{lesson_id}/complete → mark complete
             GET  /api/v1/progress/learners/{learner_id}    → LearnerProgressSummaryResponse
  Gaps     : BG-119 (content-service no GET endpoint — content_ref cannot be resolved to playable URL)
             BG-121 (delivery_state dict[str,Any] — runtime player state; schema undefined)
             BG-127 (delivery_state no schema — extends BG-121; resume position best-guess only)
  Patterns : A7 Split — 4-zone layout: Lesson Info (260px) + Content (flex-1) + Notes (280px) + Rail (56px)
             zoom:1.25 · Learner surface · standalone single-lesson view (no course outline context)
             Lesson types: self_paced (video) · document · live_session · assessment (redirect prompt)
             P-55 inline error block · P-56 partial skeleton
  CSS base : Verbatim :root + shared components from lms-a7-assessment-player-v1.html (last sealed A7)
-->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LMS — Lesson Player</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ── VERBATIM FOUNDATION — lms-a7-assessment-player-v1.html (last sealed A7) ── */
:root {
  --canvas:#F7F7F5;--white:#FFFFFF;--subtle:#F2F2F0;
  --border:#E8E8E4;--border-s:#D8D8D2;--border-focus:#5B5BD6;
  --ink:#1A1A18;--ink-2:#52524E;--ink-3:#8C8C84;--ink-4:#C0C0B8;
  --accent:#5B5BD6;--accent-lt:#F0F0FF;
  --green:#18794E;--green-bg:rgba(24,121,78,.08);--green-bd:rgba(24,121,78,.15);
  --amber:#92400E;--amber-bg:#FEF9EE;--amber-bd:rgba(146,64,14,.15);
  --red:#C42B1C;--red-bg:rgba(196,43,28,.07);--red-bd:rgba(196,43,28,.14);
  --teal:#0D9488;--teal-bg:rgba(13,148,136,.07);--teal-bd:rgba(13,148,136,.15);
  --font:'Plus Jakarta Sans',system-ui,sans-serif;
  --sh-xs:0 1px 2px rgba(0,0,0,.04);
  --sh-sm:0 2px 8px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --r:14px;--r-sm:8px;--r-pill:999px;
  --pp:28px;--body-size:14px;--lh:1.5;
  --action-bar-h:64px;
}
html{zoom:1.25;}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
body{font-family:var(--font);background:var(--canvas);color:var(--ink);-webkit-font-smoothing:antialiased;font-size:var(--body-size);line-height:var(--lh);}
.sk{background:linear-gradient(90deg,#F2F2F0 25%,#E8E8E4 50%,#F2F2F0 75%);background-size:400% 100%;animation:shimmer 1400ms ease-in-out infinite;border-radius:4px;}
@keyframes shimmer{0%{background-position:100% 0}100%{background-position:-100% 0}}
.state-bar{position:fixed;bottom:72px;left:50%;transform:translateX(-50%);background:#1A1A18;border-radius:999px;padding:5px 6px;display:flex;gap:3px;z-index:9999;box-shadow:0 4px 20px rgba(0,0,0,.25);}
.stb{padding:5px 12px;border-radius:999px;border:none;font-family:var(--font);font-size:11px;font-weight:700;cursor:pointer;background:transparent;color:rgba(255,255,255,.4);transition:all 150ms;}
.stb.on{background:white;color:#1A1A18;}
.btn-g{padding:8px 16px;border-radius:var(--r-sm);font-family:var(--font);font-size:13px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--white);color:var(--ink-2);transition:all 100ms;white-space:nowrap;}
.btn-g:hover{border-color:var(--border-s);color:var(--ink);}
.btn-primary{padding:8px 20px;border-radius:var(--r-sm);font-family:var(--font);font-size:13px;font-weight:600;cursor:pointer;border:none;background:var(--accent);color:white;transition:all 100ms;white-space:nowrap;}
.btn-primary:hover{opacity:.9;}
.btn-primary:disabled{opacity:.45;cursor:not-allowed;}
.btn-success{padding:8px 20px;border-radius:var(--r-sm);font-family:var(--font);font-size:13px;font-weight:600;cursor:pointer;border:none;background:var(--green);color:white;transition:all 100ms;white-space:nowrap;}
.btn-success:hover{opacity:.9;}
.btn-success:disabled{opacity:.45;cursor:not-allowed;}

/* ── A7 LESSON PLAYER LAYOUT ── */
.layout{display:flex;flex-direction:column;height:100vh;overflow:hidden;min-width:960px;}

/* Topbar */
.topbar{height:52px;background:var(--white);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;flex-shrink:0;gap:10px;z-index:20;}
.tb-back{font-size:13px;color:var(--ink-3);font-weight:500;cursor:pointer;padding:4px 8px;border-radius:6px;transition:all 100ms;display:flex;align-items:center;gap:5px;white-space:nowrap;}
.tb-back:hover{background:var(--subtle);color:var(--ink-2);}
.tb-sep{color:var(--ink-4);font-size:13px;}
.tb-course{font-size:14px;font-weight:700;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px;cursor:pointer;}
.tb-course:hover{color:var(--accent);}
.tb-lesson{font-size:13px;font-weight:500;color:var(--ink-3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0;}
.tb-r{margin-left:auto;display:flex;align-items:center;gap:8px;flex-shrink:0;}
.tb-status-chip{display:inline-flex;align-items:center;padding:3px 10px;border-radius:var(--r-pill);font-size:11px;font-weight:700;}
.tb-status-chip.published{background:var(--green-bg);border:1px solid var(--green-bd);color:var(--green);}
.tb-status-chip.draft{background:var(--amber-bg);border:1px solid var(--amber-bd);color:var(--amber);}
.tb-status-chip.archived{background:var(--subtle);border:1px solid var(--border);color:var(--ink-4);}
.tb-type-badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:var(--r-pill);font-size:11px;font-weight:700;background:var(--accent-lt);color:var(--accent);}
.tb-bookmark-btn{width:32px;height:32px;border-radius:6px;border:1px solid var(--border);background:var(--white);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:15px;color:var(--ink-3);transition:all 100ms;}
.tb-bookmark-btn:hover{background:var(--subtle);color:var(--ink);}
.tb-bookmark-btn.active{color:var(--accent);border-color:var(--accent);background:var(--accent-lt);}

/* Player body */
.player-body{display:flex;flex:1;overflow:hidden;}

/* ── ZONE 1 — LESSON INFO PANEL (260px) ── */
.info-panel{width:260px;flex-shrink:0;background:var(--white);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.ip-header{padding:16px;border-bottom:1px solid var(--border);flex-shrink:0;}
.ip-lesson-num{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--ink-4);margin-bottom:6px;}
.ip-lesson-title{font-size:14px;font-weight:800;color:var(--ink);line-height:1.35;margin-bottom:8px;}
.ip-meta-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.ip-meta-chip{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:var(--r-pill);font-size:10px;font-weight:700;background:var(--subtle);border:1px solid var(--border);color:var(--ink-3);}
.ip-scroll{flex:1;overflow-y:auto;padding:0;}

/* Info sections */
.ip-section{padding:14px 16px;border-bottom:1px solid var(--border);}
.ip-section:last-child{border-bottom:none;}
.ip-section-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--ink-4);margin-bottom:10px;}
.ip-desc{font-size:13px;color:var(--ink-2);line-height:1.6;}

/* Objectives list */
.obj-list{display:flex;flex-direction:column;gap:8px;}
.obj-item{display:flex;align-items:flex-start;gap:8px;}
.obj-check{width:16px;height:16px;border-radius:50%;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;font-size:9px;transition:all 150ms;cursor:pointer;}
.obj-check.done{background:var(--green-bg);border:1px solid var(--green-bd);color:var(--green);}
.obj-check.todo{background:var(--subtle);border:1px solid var(--border);color:var(--ink-4);}
.obj-text{font-size:12px;color:var(--ink-2);line-height:1.5;}
.obj-text.done{color:var(--ink-4);text-decoration:line-through;}

/* Progress in panel */
.ip-progress-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;}
.ip-prog-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-4);}
.ip-prog-pct{font-size:11px;font-weight:700;color:var(--accent);}
.ip-prog-bar{height:4px;background:var(--border);border-radius:999px;overflow:hidden;margin-bottom:10px;}
.ip-prog-fill{height:100%;background:var(--accent);border-radius:999px;transition:width 300ms;}

/* Content ref field */
.ip-field{display:flex;flex-direction:column;gap:3px;margin-bottom:8px;}
.ip-field:last-child{margin-bottom:0;}
.ip-field-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-4);}
.ip-field-val{font-size:12px;color:var(--ink-2);}
.ip-field-val.mono{font-family:monospace;font-size:11px;font-weight:400;color:var(--ink-3);background:var(--subtle);padding:3px 6px;border-radius:4px;word-break:break-all;}

/* ── ZONE 2 — CONTENT ZONE (flex-1) ── */
.content-zone{flex:1;display:flex;flex-direction:column;overflow:hidden;background:#0F0F0F;position:relative;}

/* Lesson header bar (dark) */
.content-header{background:#1A1A18;padding:10px 20px;display:flex;align-items:center;gap:10px;flex-shrink:0;}
.ch-title{font-size:14px;font-weight:700;color:white;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.ch-type-badge{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;padding:2px 7px;border-radius:3px;flex-shrink:0;}
.ch-type-badge.sp{background:rgba(13,148,136,.25);color:#5EEAD4;}
.ch-type-badge.doc{background:rgba(91,91,214,.25);color:#A5B4FC;}
.ch-type-badge.live{background:rgba(146,64,14,.25);color:#FCD34D;}
.ch-type-badge.asmt{background:rgba(217,119,6,.2);color:#FCD34D;}

/* Video player */
.video-player{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.video-frame{flex:1;background:#000;display:flex;align-items:center;justify-content:center;position:relative;}
.video-play-btn{position:absolute;width:64px;height:64px;border-radius:50%;background:rgba(255,255,255,.15);border:2px solid rgba(255,255,255,.3);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 150ms;backdrop-filter:blur(4px);}
.video-play-btn:hover{background:rgba(255,255,255,.25);transform:scale(1.06);}
.video-play-icon{font-size:22px;color:white;margin-left:4px;}
.video-controls{background:#1A1A18;padding:10px 20px;display:flex;align-items:center;gap:12px;flex-shrink:0;}
.vc-btn{width:28px;height:28px;border-radius:4px;border:none;background:none;color:rgba(255,255,255,.7);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all 100ms;}
.vc-btn:hover{background:rgba(255,255,255,.1);color:white;}
.vc-time{font-size:12px;color:rgba(255,255,255,.6);white-space:nowrap;font-family:monospace;}
.vc-progress{flex:1;height:4px;background:rgba(255,255,255,.15);border-radius:999px;cursor:pointer;position:relative;}
.vc-fill{height:100%;background:var(--accent);border-radius:999px;width:38%;}
.vc-thumb{position:absolute;top:50%;transform:translateY(-50%);width:12px;height:12px;border-radius:50%;background:white;left:38%;margin-left:-6px;box-shadow:0 1px 4px rgba(0,0,0,.4);}
.vc-volume{width:60px;height:4px;background:rgba(255,255,255,.15);border-radius:999px;}
.vc-vol-fill{height:100%;background:rgba(255,255,255,.6);border-radius:999px;width:70%;}
.vc-quality{font-size:11px;color:rgba(255,255,255,.5);padding:2px 6px;border-radius:3px;border:1px solid rgba(255,255,255,.15);cursor:pointer;}

/* Document viewer */
.doc-viewer{flex:1;display:flex;flex-direction:column;overflow:hidden;background:#525659;}
.doc-toolbar{background:#3D4043;padding:8px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0;}
.doc-tb-btn{padding:4px 10px;border-radius:4px;font-family:var(--font);font-size:12px;font-weight:600;cursor:pointer;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.08);color:rgba(255,255,255,.8);transition:all 100ms;}
.doc-tb-btn:hover{background:rgba(255,255,255,.15);}
.doc-page-nav{display:flex;align-items:center;gap:8px;margin:0 auto;}
.doc-page-input{width:40px;text-align:center;font-family:var(--font);font-size:12px;padding:3px 6px;border-radius:4px;border:1px solid rgba(255,255,255,.2);background:rgba(0,0,0,.3);color:white;}
.doc-page-label{font-size:12px;color:rgba(255,255,255,.5);}
.doc-content{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;align-items:center;gap:12px;}
.doc-page{background:white;width:100%;max-width:700px;aspect-ratio:0.77;border-radius:2px;box-shadow:0 4px 20px rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;}
.doc-page-placeholder{text-align:center;}
.dpp-icon{font-size:40px;opacity:.2;margin-bottom:10px;}
.dpp-label{font-size:13px;color:var(--ink-3);}

/* Live session placeholder */
.live-placeholder{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;padding:40px;}
.lp-icon{font-size:48px;opacity:.4;}
.lp-badge{display:inline-flex;align-items:center;padding:4px 14px;border-radius:var(--r-pill);font-size:12px;font-weight:700;background:rgba(146,64,14,.25);color:#FCD34D;margin-bottom:4px;}
.lp-title{font-size:15px;font-weight:700;color:rgba(255,255,255,.6);}
.lp-sub{font-size:13px;color:rgba(255,255,255,.3);text-align:center;max-width:320px;line-height:1.6;}
.lp-time{font-size:12px;color:rgba(255,255,255,.4);margin-top:4px;}

/* Assessment redirect prompt */
.asmt-prompt{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;padding:40px;}
.ap-icon{font-size:48px;opacity:.4;}
.ap-title{font-size:16px;font-weight:700;color:rgba(255,255,255,.7);}
.ap-sub{font-size:13px;color:rgba(255,255,255,.35);text-align:center;max-width:300px;line-height:1.6;}
.ap-btn{margin-top:8px;padding:10px 24px;border-radius:var(--r-sm);font-family:var(--font);font-size:13px;font-weight:700;cursor:pointer;border:none;background:var(--accent);color:white;transition:all 100ms;}
.ap-btn:hover{opacity:.9;}

/* Empty / Error */
.content-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px;background:var(--canvas);}
.ce-icon{font-size:40px;opacity:.3;margin-bottom:14px;}
.ce-title{font-size:15px;font-weight:700;color:var(--ink);margin-bottom:6px;}
.ce-sub{font-size:13px;color:var(--ink-3);max-width:320px;line-height:1.6;}
.err-block{background:var(--red-bg);border:1px solid var(--red-bd);border-radius:var(--r);padding:20px 24px;display:flex;gap:14px;align-items:flex-start;margin:24px;}
.err-icon{font-size:18px;flex-shrink:0;margin-top:1px;}
.err-title{font-size:14px;font-weight:700;color:var(--red);margin-bottom:4px;}
.err-msg{font-size:13px;color:var(--red);opacity:.85;line-height:1.5;}
.err-retry{margin-top:12px;padding:6px 14px;border-radius:var(--r-sm);font-family:var(--font);font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--red-bd);background:var(--white);color:var(--red);transition:all 100ms;}
.err-retry:hover{background:var(--red-bg);}

/* ── ZONE 3 — NOTES PANEL (280px) ── */
.notes-panel{width:280px;flex-shrink:0;background:var(--white);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.np-tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0;}
.np-tab{flex:1;padding:10px 0;font-size:12px;font-weight:600;color:var(--ink-3);text-align:center;cursor:pointer;border-bottom:2px solid transparent;transition:all 100ms;}
.np-tab.active{color:var(--accent);border-bottom-color:var(--accent);}
.np-body{flex:1;overflow:hidden;display:flex;flex-direction:column;}

/* Notes tab */
.notes-compose{padding:14px;border-bottom:1px solid var(--border);flex-shrink:0;}
.notes-textarea{font-family:var(--font);font-size:13px;color:var(--ink);background:var(--subtle);border:1px solid var(--border);border-radius:var(--r-sm);padding:10px;outline:none;width:100%;resize:none;height:80px;line-height:1.5;transition:border-color 120ms;}
.notes-textarea:focus{border-color:var(--border-focus);box-shadow:0 0 0 3px rgba(91,91,214,.08);background:var(--white);}
.notes-actions{display:flex;justify-content:flex-end;margin-top:8px;}
.notes-list{flex:1;overflow-y:auto;padding:10px 14px;display:flex;flex-direction:column;gap:8px;}
.note-card{background:var(--subtle);border-radius:var(--r-sm);padding:10px 12px;border:1px solid var(--border);}
.note-time{font-size:10px;color:var(--ink-4);margin-bottom:4px;}
.note-text{font-size:12px;color:var(--ink-2);line-height:1.5;}
.notes-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;text-align:center;}
.notes-empty-icon{font-size:28px;opacity:.25;margin-bottom:8px;}
.notes-empty-text{font-size:12px;color:var(--ink-4);}

/* Objectives tab */
.obj-panel{flex:1;overflow-y:auto;padding:14px;}
.obj-panel-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--ink-4);margin-bottom:12px;}
.obj-panel-list{display:flex;flex-direction:column;gap:10px;}
.obj-panel-item{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;border-radius:var(--r-sm);background:var(--subtle);border:1px solid var(--border);cursor:pointer;transition:all 100ms;}
.obj-panel-item:hover{border-color:var(--border-s);}
.obj-panel-item.checked{background:var(--green-bg);border-color:var(--green-bd);}
.obj-panel-check{width:18px;height:18px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;margin-top:1px;}
.obj-panel-check.done{background:var(--green);color:white;}
.obj-panel-check.todo{background:var(--white);border:1.5px solid var(--border-s);color:transparent;}
.obj-panel-text{font-size:12px;color:var(--ink-2);line-height:1.5;}
.obj-panel-item.checked .obj-panel-text{color:var(--green);}
.obj-progress-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.obj-progress-label{font-size:11px;color:var(--ink-3);}
.obj-progress-count{font-size:11px;font-weight:700;color:var(--green);}

/* ── ZONE 4 — RAIL (56px) ── */
.rail{height:56px;background:var(--white);border-top:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:12px;flex-shrink:0;z-index:10;}
.rail-prev,.rail-next{display:flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--r-sm);border:1px solid var(--border);background:var(--white);font-family:var(--font);font-size:13px;font-weight:600;color:var(--ink-2);cursor:pointer;transition:all 100ms;white-space:nowrap;}
.rail-prev:hover,.rail-next:hover{border-color:var(--border-s);color:var(--ink);}
.rail-prev:disabled,.rail-next:disabled{opacity:.4;cursor:not-allowed;}
.rail-center{flex:1;display:flex;align-items:center;justify-content:center;gap:10px;}
.rail-progress-label{font-size:12px;color:var(--ink-3);white-space:nowrap;}
.rail-progress-bar{width:140px;height:4px;background:var(--border);border-radius:999px;overflow:hidden;}
.rail-progress-fill{height:100%;background:var(--accent);border-radius:999px;transition:width 300ms;}
.rail-complete-btn{padding:7px 20px;border-radius:var(--r-sm);font-family:var(--font);font-size:13px;font-weight:700;cursor:pointer;border:none;transition:all 100ms;white-space:nowrap;}
.rail-complete-btn.todo{background:var(--accent);color:white;}
.rail-complete-btn.todo:hover{opacity:.9;}
.rail-complete-btn.done{background:var(--green-bg);border:1px solid var(--green-bd);color:var(--green);}
</style>
</head>
<body>

<div class="layout" id="app">

  <!-- TOPBAR -->
  <div class="topbar">
    <span class="tb-back" onclick="goBack()">← Back</span>
    <span class="tb-sep">/</span>
    <span class="tb-course" id="tb-course">Security Fundamentals</span>
    <span class="tb-sep">/</span>
    <span class="tb-lesson" id="tb-lesson-title">Network Security Protocols</span>

        <div class="ip-meta-row">
          <span class="ip-meta-chip">⏱ 28 min</span>
          <span class="ip-meta-chip" id="ip-version-chip">v2</span>

    <!-- ZONE 2 — CONTENT ZONE -->

    </div>

        <div class="np-tab active" onclick="switchNotesTab('notes')" id="ntab-notes">My Notes</div>
        <div class="np-tab" onclick="switchNotesTab('objectives')" id="ntab-objectives">Objectives</div>

      <div class="rail-progress-bar">
        <div class="rail-progress-fill" id="rail-fill" style="width:38%"></div>
      </div>

<!-- STATE SWITCHER -->
<div class="state-bar">
  <button class="stb on" onclick="setState('loaded')">Loaded</button>
  <button class="stb" onclick="setState('skeleton')">Skeleton</button>
  <button class="stb" onclick="setState('empty')">Empty</button>
  <button class="stb" onclick="setState('error')">Error</button>
</div>

<script>
/* ── MOCK DATA ──────────────────────────────────────────────────────────────
   Lesson shaped to LessonResponse (lesson-service schemas.py)
   LessonStatus: draft | published | archived
   lesson_type: untyped str — UI working set: self_paced | document | live_session | assessment (BG-117)
   content_ref: bare ID string — no resolution to playable URL (BG-119)
   delivery_state: dict[str,Any] — schema undefined (BG-121 / BG-127)
   learning_objectives: list[str] from LessonBase
   ─────────────────────────────────────────────────────────────────────── */

const LESSON = {
  lesson_id: 'ls-003',
  tenant_id: 'tenant-acme',
  course_id: 'c002',
  module_id: null,
  title: 'Network Security Protocols',
  description: 'A deep dive into the protocols that underpin modern network security — from TLS handshake mechanics to IPSec tunnel configuration. By the end of this lesson you will be able to explain how encryption is negotiated and applied at the transport and network layers.',
  lesson_type: 'self_paced',   /* BG-117: untyped str — UI working set */
  learning_objectives: [
    'Explain the TLS 1.3 handshake sequence and its security properties',
    'Describe how IPSec operates in tunnel vs. transport mode',
    'Identify common protocol vulnerabilities (BEAST, POODLE, Heartbleed)',
    'Configure certificate pinning in a client application',
  ],
  content_ref: 'cnt-a3f2b1c4',  /* BG-119: bare ID — no GET /content/{id} endpoint */
  estimated_duration_minutes: 28,
  availability_rules: {},
  metadata: { difficulty: 'intermediate', tags: ['tls', 'ipsec', 'pki'] },
  order_index: 2,
  status: 'published',
  delivery_state: { position_seconds: 634, completion_pct: 38, completed: false },  /* BG-127 */
  version: 2,
  published_version: 2,
  published_at: '2026-03-12T10:00:00Z',
  archived_at: null,
  created_by: 'u_ins_001',
  created_at: '2026-03-10T09:00:00Z',
  updated_at: '2026-03-20T14:30:00Z',
};

const COURSE_CONTEXT = {
  course_id: 'c002',
  title: 'Security Fundamentals',
  total_lessons: 5,
  lesson_order_index: 3,  /* 1-based display */
};

const STATE = {
  bookmarked: false,
  completed: false,
  completionPct: 38,    /* from delivery_state.completion_pct */
  notesTab: 'notes',
  objectives: [false, true, false, false],  /* matched to LESSON.learning_objectives */
  notes: [
    { text: 'TLS 1.3 removes RSA key exchange entirely — forward secrecy mandatory.', timestamp: '10:22' },
    { text: 'IPSec transport mode: only payload encrypted. Tunnel mode: full packet.', timestamp: '18:47' },
  ],
  notesDraft: '',
};

/* ── HELPERS ─────────────────────────────────────────────────────────────── */
function objDoneCount() { return STATE.objectives.filter(Boolean).length; }
function typeLabel(t) {
  return { self_paced:'Self-Paced', document:'Document', live_session:'Live Session', assessment:'Assessment' }[t] || t;
}
function typeBadgeClass(t) {
  return { self_paced:'sp', document:'doc', live_session:'live', assessment:'asmt' }[t] || 'sp';
}
function fmtDuration(min) {
  if (!min) return '—';
  return min >= 60 ? `${Math.floor(min/60)}h ${min%60}m` : `${min} min`;
}
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ── INTERACTIONS ────────────────────────────────────────────────────────── */
function toggleBookmark() {
  STATE.bookmarked = !STATE.bookmarked;
  const btn = document.getElementById('tb-bookmark');
  if (btn) btn.classList.toggle('active', STATE.bookmarked);
}

function toggleComplete() {
  STATE.completed = !STATE.completed;
  STATE.completionPct = STATE.completed ? 100 : 38;
  /* POST /api/v1/progress/lessons/{lesson_id}/complete or upsert */
  renderRail();
  /* update objective panel progress */
  renderNotesPanel();
}

function toggleObjective(idx) {
  STATE.objectives[idx] = !STATE.objectives[idx];
  renderInfoPanel();
  renderNotesPanel();
}

function navLesson(dir) {
  /* Navigate to previous/next lesson in course context */
  /* In standalone player: navigates to adjacent lesson_id */
}

function goBack() { /* Returns to Course Player or Course Detail */ }

function addNote() {
  const ta = document.getElementById('notes-ta');
  if (!ta || !ta.value.trim()) return;
  STATE.notes.unshift({ text: ta.value.trim(), timestamp: '—' });
  ta.value = '';
  renderNotesPanel();
}

function switchNotesTab(tab) {
  STATE.notesTab = tab;
  document.getElementById('ntab-notes').classList.toggle('active', tab === 'notes');
  document.getElementById('ntab-objectives').classList.toggle('active', tab === 'objectives');
  renderNotesPanel();
}

/* ── RENDER ──────────────────────────────────────────────────────────────── */
function render() {
  renderTopbar();
  renderInfoPanel();
  renderContent();
  renderNotesPanel();
  renderRail();
}

function renderTopbar() {
  const tb = document.getElementById('tb-type');
  if (tb) tb.textContent = typeLabel(LESSON.lesson_type);
}

function renderInfoPanel() {
  const scroll = document.getElementById('ip-scroll');
  if (!scroll) return;

  const doneCount = objDoneCount();
  const objPct = Math.round((doneCount / LESSON.learning_objectives.length) * 100);

  scroll.innerHTML = `
    <div class="ip-section">
      <div class="ip-section-title">Description</div>
      <div class="ip-desc">${escHtml(LESSON.description)}</div>
    </div>
    <div class="ip-section">
      <div class="ip-section-title">Progress</div>
      <div class="ip-progress-row">
        <span class="ip-prog-label">Watched</span>
        <span class="ip-prog-pct">${STATE.completionPct}%</span>
      </div>
      <div class="ip-prog-bar"><div class="ip-prog-fill" style="width:${STATE.completionPct}%"></div></div>
      <div class="ip-progress-row" style="margin-top:8px;">
        <span class="ip-prog-label">Objectives</span>
        <span class="ip-prog-pct">${doneCount} / ${LESSON.learning_objectives.length}</span>
      </div>
      <div class="ip-prog-bar"><div class="ip-prog-fill" style="width:${objPct}%"></div></div>
    </div>
    <div class="ip-section">
      <div class="ip-section-title">Learning Objectives</div>
      <div class="obj-list">
        ${LESSON.learning_objectives.map((obj, i) => `
          <div class="obj-item" onclick="toggleObjective(${i})" style="cursor:pointer;">
            <div class="obj-check ${STATE.objectives[i] ? 'done' : 'todo'}">${STATE.objectives[i] ? '✓' : ''}</div>
            <div class="obj-text ${STATE.objectives[i] ? 'done' : ''}">${escHtml(obj)}</div>
          </div>`).join('')}
      </div>
    </div>
    <div class="ip-section">
      <div class="ip-section-title">Lesson Details</div>
      <div class="ip-field">
        <span class="ip-field-label">Type</span>
        <span class="ip-field-val">${typeLabel(LESSON.lesson_type)}</span>
      </div>
      <div class="ip-field">
        <span class="ip-field-label">Duration</span>
        <span class="ip-field-val">${fmtDuration(LESSON.estimated_duration_minutes)}</span>
      </div>
      <div class="ip-field">
        <span class="ip-field-label">Version</span>
        <span class="ip-field-val">v${LESSON.version}${LESSON.published_version ? ' (published v' + LESSON.published_version + ')' : ''}</span>
      </div>
      <div class="ip-field">
        <span class="ip-field-label">Content ref</span>
        <span class="ip-field-val mono">${escHtml(LESSON.content_ref || '—')}</span>
      </div>
    </div>`;
}

function renderContent() {
  const cz = document.getElementById('content-zone');
  if (!cz) return;

  const typeBadge = `<span class="ch-type-badge ${typeBadgeClass(LESSON.lesson_type)}">${typeLabel(LESSON.lesson_type)}</span>`;

  if (LESSON.lesson_type === 'self_paced') {
    /* BG-119: content_ref cannot be resolved — video renders as player UI stub */
    cz.innerHTML = `
      <div class="content-header">
        <span class="ch-title">${escHtml(LESSON.title)}</span>
        ${typeBadge}
      </div>
      <div class="video-player">
        <div class="video-frame">
          <div class="video-play-btn"><span class="video-play-icon">▶</span></div>
        </div>
        <div class="video-controls">
          <button class="vc-btn">⏮</button>
          <button class="vc-btn">▶</button>
          <button class="vc-btn">⏭</button>
          <span class="vc-time">10:34 / 28:00</span>
          <div class="vc-progress">
            <div class="vc-fill"></div>
            <div class="vc-thumb"></div>
          </div>
          <div class="vc-volume"><div class="vc-vol-fill"></div></div>
          <span class="vc-quality">1080p</span>
          <button class="vc-btn">⛶</button>
        </div>
      </div>`;
  } else if (LESSON.lesson_type === 'document') {
    cz.innerHTML = `
      <div class="content-header">
        <span class="ch-title">${escHtml(LESSON.title)}</span>
        ${typeBadge}
      </div>
      <div class="doc-viewer">
        <div class="doc-toolbar">
          <button class="doc-tb-btn">− Zoom</button>
          <button class="doc-tb-btn">+ Zoom</button>
          <div class="doc-page-nav">
            <button class="doc-tb-btn">‹</button>
            <input class="doc-page-input" value="1">
            <span class="doc-page-label">/ 12</span>
            <button class="doc-tb-btn">›</button>
          </div>
          <button class="doc-tb-btn" style="margin-left:auto">⬇ Download</button>
        </div>
        <div class="doc-content">
          <div class="doc-page">
            <div class="doc-page-placeholder">
              <div class="dpp-icon">📄</div>
              <div class="dpp-label">Page 1</div>
            </div>
          </div>
        </div>
      </div>`;
  } else if (LESSON.lesson_type === 'live_session') {
    cz.innerHTML = `
      <div class="content-header">
        <span class="ch-title">${escHtml(LESSON.title)}</span>
        ${typeBadge}
      </div>
      <div class="live-placeholder">
        <div class="lp-icon">📡</div>
        <div class="lp-badge">Live Session</div>
        <div class="lp-title">Session not yet started</div>
        <div class="lp-sub">This lesson is delivered as a live instructor-led session. You will receive an invitation with join details.</div>
        <div class="lp-time">Scheduled: TBD</div>
      </div>`;
  } else if (LESSON.lesson_type === 'assessment') {
    cz.innerHTML = `
      <div class="content-header">
        <span class="ch-title">${escHtml(LESSON.title)}</span>
        ${typeBadge}
      </div>
      <div class="asmt-prompt">
        <div class="ap-icon">📝</div>
        <div class="ap-title">Assessment Lesson</div>
        <div class="ap-sub">This lesson contains an assessment. Open the Assessment Player to begin.</div>
        <button class="ap-btn">Open Assessment →</button>
      </div>`;
  }
}

function renderNotesPanel() {
  const body = document.getElementById('np-body');
  if (!body) return;
  if (STATE.notesTab === 'notes') {
    body.innerHTML = `
      <div class="notes-compose">
        <textarea class="notes-textarea" id="notes-ta" placeholder="Add a note at this point in the lesson…">${escHtml(STATE.notesDraft)}</textarea>
        <div class="notes-actions">
          <button class="btn-primary" style="padding:6px 14px;font-size:12px;" onclick="addNote()">Save Note</button>
        </div>
      </div>
      <div class="notes-list" id="notes-list">
        ${STATE.notes.length === 0
          ? `<div class="notes-empty"><div class="notes-empty-icon">📝</div><div class="notes-empty-text">No notes yet. Add your first note above.</div></div>`
          : STATE.notes.map(n => `
            <div class="note-card">
              <div class="note-time">${escHtml(n.timestamp)}</div>
              <div class="note-text">${escHtml(n.text)}</div>
            </div>`).join('')}
      </div>`;
  } else {
    const doneCount = objDoneCount();
    body.innerHTML = `
      <div class="obj-panel">
        <div class="obj-progress-row">
          <span class="obj-progress-label">Learning objectives</span>
          <span class="obj-progress-count">${doneCount} / ${LESSON.learning_objectives.length} done</span>
        </div>
        <div class="obj-panel-list">
          ${LESSON.learning_objectives.map((obj, i) => `
            <div class="obj-panel-item${STATE.objectives[i] ? ' checked' : ''}" onclick="toggleObjective(${i})">
              <div class="obj-panel-check ${STATE.objectives[i] ? 'done' : 'todo'}">${STATE.objectives[i] ? '✓' : ''}</div>
              <div class="obj-panel-text">${escHtml(obj)}</div>
            </div>`).join('')}
        </div>
      </div>`;
  }
}

function renderRail() {
  const btn = document.getElementById('rail-complete');
  const fill = document.getElementById('rail-fill');
  const label = document.getElementById('rail-label');
  const prev = document.getElementById('rail-prev');
  const next = document.getElementById('rail-next');
  if (btn) {
    btn.className = `rail-complete-btn ${STATE.completed ? 'done' : 'todo'}`;
    btn.textContent = STATE.completed ? '✓ Completed' : 'Mark Complete';
  }
  if (fill) fill.style.width = STATE.completionPct + '%';
  if (label) label.textContent = STATE.completionPct + '% complete';
  if (prev) prev.disabled = COURSE_CONTEXT.lesson_order_index <= 1;
  if (next) next.disabled = COURSE_CONTEXT.lesson_order_index >= COURSE_CONTEXT.total_lessons;
}

/* ── STATE SWITCHER ──────────────────────────────────────────────────────── */
function setState(s) {
  document.querySelectorAll('.stb').forEach(b => b.classList.remove('on'));
  event.target.classList.add('on');
  const cz = document.getElementById('content-zone');
  const ip = document.getElementById('info-panel');
  const np = document.getElementById('notes-panel');

  if (s === 'loaded') {
    ip.style.display = '';
    np.style.display = '';
    render();
  } else if (s === 'skeleton') {
    ip.innerHTML = `<div style="padding:16px;display:flex;flex-direction:column;gap:12px;">
      <div class="sk" style="height:10px;width:50%"></div>
      <div class="sk" style="height:18px;width:85%;margin-bottom:4px"></div>
      <div style="display:flex;gap:6px;">
        <div class="sk" style="height:18px;width:60px;border-radius:999px"></div>
        <div class="sk" style="height:18px;width:40px;border-radius:999px"></div>
      </div>
      ${Array(6).fill(0).map(() => `<div class="sk" style="height:12px;width:${60 + Math.random() * 30 | 0}%"></div>`).join('')}
      <div class="sk" style="height:4px;width:100%;margin:4px 0"></div>
      ${Array(4).fill(0).map(() => `<div style="display:flex;gap:8px;padding:4px 0;">
        <div class="sk" style="width:16px;height:16px;border-radius:50%;flex-shrink:0"></div>
        <div class="sk" style="height:12px;flex:1"></div></div>`).join('')}
    </div>`;
    cz.innerHTML = `<div style="background:#1A1A18;padding:12px 20px;display:flex;gap:10px;align-items:center;">
      <div class="sk" style="height:16px;flex:1;background:rgba(255,255,255,.08)"></div>
      <div class="sk" style="height:20px;width:70px;border-radius:3px;background:rgba(255,255,255,.08)"></div>
    </div>
    <div style="flex:1;background:#000;display:flex;align-items:center;justify-content:center;">
      <div class="sk" style="width:64px;height:64px;border-radius:50%;background:rgba(255,255,255,.08)"></div>
    </div>
    <div style="background:#1A1A18;padding:12px 20px;display:flex;gap:12px;align-items:center;height:48px;">
      <div class="sk" style="height:10px;width:80px;background:rgba(255,255,255,.08)"></div>
      <div class="sk" style="height:4px;flex:1;background:rgba(255,255,255,.08)"></div>
      <div class="sk" style="height:10px;width:50px;background:rgba(255,255,255,.08)"></div>
    </div>`;
    np.innerHTML = `<div style="padding:16px;display:flex;flex-direction:column;gap:10px;">
      ${Array(5).fill(0).map(() => `<div class="sk" style="height:12px;width:${55 + Math.random() * 35 | 0}%"></div>`).join('')}
    </div>`;
  } else if (s === 'empty') {
    ip.style.display = 'none';
    np.style.display = 'none';
    cz.innerHTML = `<div class="content-empty">
      <div class="ce-icon">📭</div>
      <div class="ce-title">Lesson Not Available</div>
      <div class="ce-sub">This lesson is not yet published. Check back later or contact your instructor.</div>
    </div>`;
  } else if (s === 'error') {
    ip.style.display = 'none';
    np.style.display = 'none';
    cz.innerHTML = `<div class="err-block">
      <span class="err-icon">⚠</span>
      <div>
        <div class="err-title">Unable to load lesson</div>
        <div class="err-msg">There was a problem loading this lesson. Your progress has been saved. Please try again.</div>
        <button class="err-retry" onclick="setState('loaded')">Retry</button>
      </div>
    </div>`;
  }
}

/* ── INIT ─────────────────────────────────────────────────────────────────── */
render();
</script>
</body>
