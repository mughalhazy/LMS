<!DOCTYPE html>
<html lang="en">
<head>
<!--
  Page     : Course Analytics
  Archetype: A8 Insight — Grid layout
  Created  : 2026-03-23
  Surface  : Instructor · Admin
  Repo     : learning-analytics-service (Python class only — no HTTP REST — BG-063)
               Methods: get_course_completion_analytics → enrolled_learners, completed_learners,
                        completion_rate, median_time_to_complete_hours
                        get_learner_engagement_metrics → active_learners, average_engagement_score,
                        engagement_score_distribution {p50, p90}, scores_by_learner
                        get_learning_path_completion_analysis → stage_counts {assigned,started,midpoint,completed},
                        drop_off_rate_by_stage, dominant_drop_off_stage
             attempt-service (full REST)
               GET /api/v1/attempts/history  → AttemptHistoryResponse (no course_id filter — BG-135)
               GET /api/v1/attempts/{id}     → AttemptResponse
  Modes    : Explore (KPIs + funnel + engagement + score dist) · Export (attempts table)
  Endpoints: (all data mocked — BG-063 no REST; BG-135 no course_id filter on attempts)
  Gaps     : BG-063 (learning-analytics-service no HTTP REST API — all chart data mocked; pre-existing)
             BG-135 (GET /api/v1/attempts/history no course_id filter — score data mocked)
             BG-131 (no GET /reports — pre-existing)
             BG-132 (export download stub — pre-existing)
  Patterns : A8 Insight — Grid layout: topbar + filter bar + KPI strip + chart grid + attempts table
             zoom:1.25 · Instructor/Admin surface · --pp:28px · row-height:40px
             Explore: KPI strip (4) + completion funnel + trend SVG + engagement dist + score dist
             Export: AttemptResponse table + CSV/PDF stub
             P-56 skeleton · P-55 inline error
  CSS base : Verbatim :root + shared components from lms-a8-compliance-reports-v1.html (last sealed A8)
-->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LMS — Course Analytics</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ── VERBATIM FOUNDATION — lms-a8-compliance-reports-v1.html (last sealed A8) ── */
:root {
  --canvas:#F7F7F5;--white:#FFFFFF;--subtle:#F2F2F0;
  --border:#E8E8E4;--border-s:#D8D8D2;--border-focus:#5B5BD6;
  --ink:#1A1A18;--ink-2:#52524E;--ink-3:#8C8C84;--ink-4:#C0C0B8;
  --accent:#5B5BD6;--accent-lt:#F0F0FF;
  --green:#18794E;--green-bg:rgba(24,121,78,.08);--green-bd:rgba(24,121,78,.15);
  --amber:#92400E;--amber-bg:#FEF9EE;--amber-bd:rgba(146,64,14,.15);
  --red:#C42B1C;--red-bg:rgba(196,43,28,.07);--red-bd:rgba(196,43,28,.14);
  --teal:#0D9488;--teal-bg:rgba(13,148,136,.07);--teal-bd:rgba(13,148,136,.15);
  --font:'Plus Jakarta Sans',system-ui,sans-serif;
  --sh-xs:0 1px 2px rgba(0,0,0,.04);
  --sh-sm:0 2px 8px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --r:14px;--r-sm:8px;--r-pill:999px;
  --pp:28px;--body-size:14px;--lh:1.5;
  --action-bar-h:64px;
}
html{zoom:1.25;}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
body{font-family:var(--font);background:var(--canvas);color:var(--ink);-webkit-font-smoothing:antialiased;font-size:var(--body-size);line-height:var(--lh);}
.sk{background:linear-gradient(90deg,#F2F2F0 25%,#E8E8E4 50%,#F2F2F0 75%);background-size:400% 100%;animation:shimmer 1400ms ease-in-out infinite;border-radius:4px;}
@keyframes shimmer{0%{background-position:100% 0}100%{background-position:-100% 0}}
.state-bar{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);background:#1A1A18;border-radius:999px;padding:5px 6px;display:flex;gap:3px;z-index:9999;box-shadow:0 4px 20px rgba(0,0,0,.25);}
.stb{padding:5px 12px;border-radius:999px;border:none;font-family:var(--font);font-size:11px;font-weight:700;cursor:pointer;background:transparent;color:rgba(255,255,255,.4);transition:all 150ms;}
.stb.on{background:white;color:#1A1A18;}
.btn-g{padding:8px 16px;border-radius:var(--r-sm);font-family:var(--font);font-size:13px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--white);color:var(--ink-2);transition:all 100ms;white-space:nowrap;}
.btn-g:hover{border-color:var(--border-s);color:var(--ink);}
.btn-primary{padding:8px 20px;border-radius:var(--r-sm);font-family:var(--font);font-size:13px;font-weight:600;cursor:pointer;border:none;background:var(--accent);color:white;transition:all 100ms;white-space:nowrap;}
.btn-primary:hover{opacity:.9;}
.btn-primary:disabled{opacity:.45;cursor:not-allowed;}

/* ── A8 INSIGHT LAYOUT ── */
.layout{display:flex;flex-direction:column;min-height:100vh;background:var(--canvas);}

/* Topbar */
.topbar{height:56px;background:var(--white);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 var(--pp);gap:16px;flex-shrink:0;position:sticky;top:0;z-index:20;}
.tb-title{font-size:16px;font-weight:800;color:var(--ink);}
.tb-divider{width:1px;height:20px;background:var(--border);}
.mode-toggle{display:flex;background:var(--subtle);border-radius:var(--r-sm);padding:3px;gap:2px;}
.mode-btn{padding:5px 14px;border-radius:6px;border:none;font-family:var(--font);font-size:12px;font-weight:700;cursor:pointer;transition:all 120ms;color:var(--ink-3);background:transparent;}
.mode-btn.active{background:var(--white);color:var(--ink);box-shadow:var(--sh-xs);}
.tb-r{margin-left:auto;display:flex;align-items:center;gap:8px;}
.tb-course-name{font-size:13px;font-weight:600;color:var(--ink-2);}
.tb-gen-time{font-size:12px;color:var(--ink-4);}

/* Filter bar */
.filter-bar{background:var(--white);border-bottom:1px solid var(--border);padding:12px var(--pp);display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.fb-label{font-size:12px;font-weight:700;color:var(--ink-3);white-space:nowrap;}
.fb-select{height:34px;padding:0 10px;border-radius:var(--r-sm);border:1px solid var(--border);background:var(--white);font-family:var(--font);font-size:13px;color:var(--ink-2);cursor:pointer;outline:none;transition:border-color 100ms;}
.fb-select:focus{border-color:var(--border-focus);}
.fb-input{height:34px;padding:0 10px;border-radius:var(--r-sm);border:1px solid var(--border);background:var(--white);font-family:var(--font);font-size:13px;color:var(--ink-2);outline:none;transition:border-color 100ms;width:130px;}
.fb-input:focus{border-color:var(--border-focus);}
.fb-sep{color:var(--ink-4);font-size:13px;}
.fb-run{padding:7px 18px;border-radius:var(--r-sm);border:none;font-family:var(--font);font-size:13px;font-weight:700;cursor:pointer;background:var(--accent);color:white;transition:all 100ms;}
.fb-run:hover{opacity:.9;}
.active-filters{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.filter-chip{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:var(--r-pill);background:var(--accent-lt);border:1px solid rgba(91,91,214,.2);font-size:11px;font-weight:600;color:var(--accent);}
.filter-chip-x{cursor:pointer;opacity:.6;font-size:13px;margin-left:2px;}
.filter-chip-x:hover{opacity:1;}
.fb-clear{font-size:12px;color:var(--ink-3);cursor:pointer;padding:4px 8px;border-radius:4px;background:none;border:none;font-family:var(--font);transition:all 100ms;}
.fb-clear:hover{background:var(--subtle);color:var(--ink-2);}

/* Page canvas */
.page-canvas{flex:1;padding:var(--pp);display:flex;flex-direction:column;gap:20px;max-width:1400px;width:100%;}

/* KPI strip */
.kpi-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;}
.kpi-card{background:var(--white);border-radius:var(--r);padding:20px;border:1px solid var(--border);box-shadow:var(--sh-xs);}
.kpi-card.l1{border-left:3px solid var(--accent);}
.kpi-card.l1-green{border-left:3px solid var(--green);}
.kpi-card.l1-teal{border-left:3px solid var(--teal);}
.kpi-card.l1-amber{border-left:3px solid var(--amber);}
.kpi-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-4);margin-bottom:8px;}
.kpi-value{font-size:32px;font-weight:800;color:var(--ink);line-height:1;margin-bottom:4px;}
.kpi-value.green{color:var(--green);}
.kpi-value.teal{color:var(--teal);}
.kpi-value.amber{color:var(--amber);}
.kpi-unit{font-size:12px;color:var(--ink-3);}
.kpi-sub{font-size:11px;color:var(--ink-4);margin-top:6px;}

/* Chart layout */
.chart-grid{display:grid;grid-template-columns:1fr 300px;gap:16px;}
.chart-row2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.chart-card{background:var(--white);border-radius:var(--r);padding:20px;border:1px solid var(--border);box-shadow:var(--sh-xs);}
.chart-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px;}
.chart-title{font-size:13px;font-weight:700;color:var(--ink);word-spacing:0.08em;}
.chart-subtitle{font-size:11px;color:var(--ink-4);margin-top:2px;}
.chart-badge{padding:2px 8px;border-radius:var(--r-pill);font-size:10px;font-weight:700;background:var(--amber-bg);border:1px solid var(--amber-bd);color:var(--amber);}

/* Completion funnel */
.funnel{display:flex;flex-direction:column;gap:8px;}
.funnel-stage{display:flex;align-items:center;gap:12px;}
.funnel-label{font-size:12px;color:var(--ink-2);width:80px;flex-shrink:0;}
.funnel-track{flex:1;height:28px;background:var(--subtle);border-radius:4px;overflow:hidden;position:relative;}
.funnel-fill{height:100%;border-radius:4px;display:flex;align-items:center;padding-left:10px;transition:width 700ms cubic-bezier(.23,1,.32,1);}
.funnel-fill.assigned{background:var(--accent);}
.funnel-fill.started{background:var(--teal);}
.funnel-fill.midpoint{background:var(--amber-bg);border:1px solid var(--amber-bd);}
.funnel-fill.completed{background:var(--green);}
.funnel-count{font-size:11px;font-weight:700;color:white;}
.funnel-count.dark{color:var(--amber);}
.funnel-pct{font-size:11px;font-weight:700;color:var(--ink-3);width:40px;text-align:right;flex-shrink:0;}
.funnel-dropoff{font-size:10px;color:var(--red);width:64px;text-align:right;flex-shrink:0;}

/* Trend SVG */
.trend-wrap{width:100%;height:140px;}

/* Engagement score distribution — horizontal bar */
.eng-chart{display:flex;flex-direction:column;gap:10px;}
.eng-row{display:flex;align-items:center;gap:10px;}
.eng-label{font-size:11px;color:var(--ink-3);width:48px;flex-shrink:0;text-align:right;}
.eng-track{flex:1;height:16px;background:var(--subtle);border-radius:3px;overflow:hidden;}
.eng-fill{height:100%;border-radius:3px;background:var(--accent);transition:width 600ms cubic-bezier(.23,1,.32,1);}
.eng-val{font-size:11px;font-weight:700;color:var(--ink-2);width:32px;flex-shrink:0;}
.eng-divider{display:flex;align-items:center;gap:8px;margin:4px 0;}
.eng-divider-line{flex:1;height:1px;background:var(--border);}
.eng-divider-label{font-size:10px;color:var(--ink-4);font-weight:700;text-transform:uppercase;letter-spacing:.05em;}

/* Score distribution — band chart */
.score-bands{display:flex;flex-direction:column;gap:8px;}
.score-band-row{display:flex;align-items:center;gap:10px;}
.score-band-label{font-size:11px;color:var(--ink-2);width:72px;flex-shrink:0;}
.score-band-track{flex:1;height:20px;background:var(--subtle);border-radius:3px;overflow:hidden;}
.score-band-fill{height:100%;border-radius:3px;transition:width 600ms cubic-bezier(.23,1,.32,1);}
.score-band-fill.high{background:var(--green);}
.score-band-fill.mid{background:var(--teal);}
.score-band-fill.low{background:var(--amber-bg);border:1px solid var(--amber-bd);}
.score-band-fill.fail{background:var(--red);opacity:.7;}
.score-band-count{font-size:11px;font-weight:700;color:var(--ink-3);width:28px;text-align:right;flex-shrink:0;}

/* Attempts table */
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.section-title{font-size:14px;font-weight:700;color:var(--ink);word-spacing:0.08em;}
.section-sub{font-size:12px;color:var(--ink-3);margin-top:2px;}
.table-card{background:var(--white);border-radius:var(--r);border:1px solid var(--border);box-shadow:var(--sh-xs);overflow:hidden;}
.table-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;}
th{padding:10px 14px;text-align:left;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-4);border-bottom:1px solid var(--border);white-space:nowrap;background:var(--subtle);}
td{padding:0 14px;height:40px;font-size:13px;color:var(--ink-2);border-bottom:1px solid var(--border);}
tr:last-child td{border-bottom:none;}
tr:hover td{background:var(--subtle);}
.cell-name{font-weight:600;color:var(--ink);}
.cell-mono{font-family:monospace;font-size:12px;color:var(--ink-3);}
.score-pill{display:inline-flex;align-items:center;padding:2px 8px;border-radius:var(--r-pill);font-size:11px;font-weight:700;}
.score-pill.pass{background:var(--green-bg);border:1px solid var(--green-bd);color:var(--green);}
.score-pill.fail{background:var(--red-bg);border:1px solid var(--red-bd);color:var(--red);}

/* Status chips */
.chip{display:inline-flex;align-items:center;padding:2px 8px;border-radius:var(--r-pill);font-size:11px;font-weight:700;}
.chip.scored{background:var(--green-bg);border:1px solid var(--green-bd);color:var(--green);}
.chip.submitted{background:var(--accent-lt);border:1px solid rgba(91,91,214,.2);color:var(--accent);}
.chip.in_progress{background:var(--subtle);border:1px solid var(--border);color:var(--ink-4);}

/* Pagination */
.pagination{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-top:1px solid var(--border);}
.pag-info{font-size:12px;color:var(--ink-3);}
.pag-controls{display:flex;align-items:center;gap:6px;}
.pag-btn{width:32px;height:32px;border-radius:var(--r-sm);border:1px solid var(--border);background:var(--white);font-family:var(--font);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--ink-3);transition:all 100ms;}
.pag-btn:hover{border-color:var(--border-s);color:var(--ink);}
.pag-btn:disabled{opacity:.4;cursor:not-allowed;}
.pag-page{font-size:12px;color:var(--ink-2);padding:0 8px;}

/* Export section */
.export-section{display:flex;flex-direction:column;gap:16px;}
.export-header{display:flex;align-items:center;justify-content:space-between;}
.export-title{font-size:14px;font-weight:700;color:var(--ink);word-spacing:0.08em;}
.export-actions{display:flex;align-items:center;gap:8px;}
.export-btn{display:flex;align-items:center;gap:6px;padding:7px 16px;border-radius:var(--r-sm);border:1px solid var(--border);background:var(--white);font-family:var(--font);font-size:13px;font-weight:600;cursor:pointer;color:var(--ink-2);transition:all 100ms;}
.export-btn:hover{border-color:var(--border-s);color:var(--ink);}
.export-btn.primary{border:none;background:var(--accent);color:white;}
.export-btn.primary:hover{opacity:.9;}

/* Empty / Error states */
.page-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px;text-align:center;}
.pe-icon{font-size:40px;opacity:.3;margin-bottom:14px;}
.pe-title{font-size:16px;font-weight:700;color:var(--ink);margin-bottom:6px;}
.pe-sub{font-size:13px;color:var(--ink-3);max-width:360px;line-height:1.6;margin-bottom:20px;}
.err-block{background:var(--red-bg);border:1px solid var(--red-bd);border-radius:var(--r);padding:20px 24px;display:flex;gap:14px;align-items:flex-start;margin:24px var(--pp);}
.err-icon{font-size:18px;flex-shrink:0;margin-top:1px;}
.err-title{font-size:14px;font-weight:700;color:var(--red);margin-bottom:4px;}
.err-msg{font-size:13px;color:var(--red);opacity:.85;line-height:1.5;}
.err-retry{margin-top:12px;padding:6px 14px;border-radius:var(--r-sm);font-family:var(--font);font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--red-bd);background:var(--white);color:var(--red);transition:all 100ms;}
.err-retry:hover{background:var(--red-bg);}

/* Toast */
.toast{position:fixed;bottom:60px;right:24px;background:#1A1A18;color:white;padding:10px 18px;border-radius:var(--r-sm);font-size:13px;font-weight:600;box-shadow:0 4px 20px rgba(0,0,0,.2);z-index:300;opacity:0;transition:opacity 200ms;pointer-events:none;}
.toast.show{opacity:1;}
</style>
</head>
<body>

<div class="layout" id="app">

  <!-- TOPBAR -->
  <div class="topbar">
    <span class="tb-title">Course Analytics</span>
    <div class="tb-divider"></div>
    <span class="tb-course-name">Security Fundamentals</span>
    <div class="mode-toggle">
      <button class="mode-btn active" id="mode-explore" onclick="setMode('explore')">Explore</button>
      <button class="mode-btn" id="mode-export" onclick="setMode('export')">Export</button>
    </div>
    <div class="tb-r">
      <span class="tb-gen-time" id="gen-time">Generated: 23 Mar 2026, 09:41</span>
      <button class="btn-g" onclick="refreshReport()">↻ Refresh</button>
    </div>
  </div>

  <!-- FILTER BAR -->
  <div class="filter-bar">
    <span class="fb-label">Filters</span>
    <select class="fb-select" id="f-course" onchange="updateCourse()">
      <option value="c002" selected>Security Fundamentals</option>
      <option value="c006">Data Privacy & Compliance</option>
      <option value="c013">GDPR Deep Dive</option>
      <option value="c021">SOC 2 Compliance</option>
    </select>
    <select class="fb-select" id="f-cohort">
      <option value="">All Cohorts</option>
      <option value="coh-001" selected>Q1 2026</option>
      <option value="coh-002">Q4 2025</option>
      <option value="coh-003">Q3 2025</option>
    </select>
    <span class="fb-sep">From</span>
    <input class="fb-input" type="date" id="f-from" value="2026-01-01">
    <span class="fb-sep">To</span>
    <input class="fb-input" type="date" id="f-to" value="2026-03-23">
    <button class="fb-run" onclick="runReport()">Analyse</button>
    <div class="active-filters">
      <span class="filter-chip">Security Fundamentals <span class="filter-chip-x" onclick="clearFilter('f-course')">×</span></span>
      <span class="filter-chip">Q1 2026 <span class="filter-chip-x" onclick="clearFilter('f-cohort')">×</span></span>
    </div>
    <button class="fb-clear" onclick="clearAllFilters()">Clear all</button>
  </div>

  <!-- PAGE CANVAS -->
  <div class="page-canvas" id="page-canvas"></div>

</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- STATE SWITCHER -->
<div class="state-bar">
  <button class="stb on" onclick="setState('loaded')">Loaded</button>
  <button class="stb" onclick="setState('skeleton')">Skeleton</button>
  <button class="stb" onclick="setState('empty')">Empty</button>
  <button class="stb" onclick="setState('error')">Error</button>
</div>

<script>
/* ── MOCK DATA ──────────────────────────────────────────────────────────────
   All data mocked — two backend gaps block live data:
   BG-063: learning-analytics-service has no HTTP REST API (Python class only)
           Shapes mocked: course_completion_analytics, learner_engagement_metrics,
           learning_path_completion_analysis (stage_counts, drop_off_rate_by_stage)
   BG-135: GET /api/v1/attempts/history has no course_id filter — N×M fan-out impractical
           AttemptResponse shape mocked for the attempts table
   ─────────────────────────────────────────────────────────────────────── */

// course_completion_analytics response shape (learning-analytics-service — BG-063)
const COMPLETION_ANALYTICS = {
  course_id: 'c002',
  cohort_id: 'coh-001',
  enrolled_learners: 55,
  completed_learners: 42,
  completion_rate: 76.36,
  median_time_to_complete_hours: 3.4
};

// learner_engagement_metrics response shape (learning-analytics-service — BG-063)
const ENGAGEMENT_METRICS = {
  course_id: 'c002',
  active_learners: 51,
  average_engagement_score: 72.4,
  engagement_score_distribution: { p50: 68.0, p90: 91.5 }
};

// learning_path_completion_analysis → stage_counts + drop_off (BG-063)
const FUNNEL = {
  stage_counts: { assigned: 55, started: 49, midpoint: 46, completed: 42 },
  drop_off_rate_by_stage: { assigned: 10.9, started: 6.1, midpoint: 8.7 },
  dominant_drop_off_stage: 'assigned'
};

// 6-month completion rate trend (mocked — BG-063)
const TREND = [
  { month:'Oct', rate:61 },
  { month:'Nov', rate:65 },
  { month:'Dec', rate:68 },
  { month:'Jan', rate:71 },
  { month:'Feb', rate:74 },
  { month:'Mar', rate:76 }
];

// Score band distribution (mocked — BG-135: no course_id filter on attempts/history)
const SCORE_BANDS = [
  { label:'90–100%', count:12, pct:29, cls:'high' },
  { label:'75–89%',  count:18, pct:43, cls:'mid' },
  { label:'60–74%',  count:8,  pct:19, cls:'low' },
  { label:'<60%',    count:4,  pct:10, cls:'fail' }
];

// AttemptResponse-shaped records (attempt-service schemas.py — BG-135)
// AttemptStatus: in_progress | submitted | scored
const MOCK_ATTEMPTS = [

/* ── STATE ── */
let currentMode = 'explore';
let currentState = 'loaded';

/* ── HELPERS ── */
function fmtDate(d) { return d ? new Date(d+'T00:00:00').toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}) : '—'; }
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2500);
}
function statusChip(s) {
  const map = { scored:'scored', submitted:'submitted', in_progress:'in_progress' };
  const lbl = { scored:'Scored', submitted:'Submitted', in_progress:'In Progress' };
  return `<span class="chip ${map[s]||''}">${lbl[s]||s}</span>`;
}

/* ── MODE / STATE ── */
function setMode(m) {
  currentMode = m;
  document.getElementById('mode-explore').classList.toggle('active', m==='explore');
  document.getElementById('mode-export').classList.toggle('active', m==='export');
  render();
}
function setState(s) {
  currentState = s;
  document.querySelectorAll('.stb').forEach(b=>b.classList.toggle('on', b.textContent.toLowerCase().replace(' ','_')===s||b.textContent.toLowerCase()===s));
  render();
}
function updateCourse() { showToast('Course changed — re-analysing'); }
function clearFilter(id) { document.getElementById(id).selectedIndex=0; }
function clearAllFilters() { ['f-course','f-cohort'].forEach(id=>{ document.getElementById(id).selectedIndex=0; }); document.getElementById('f-from').value=''; document.getElementById('f-to').value=''; }
function runReport() { showToast('Analysis updated'); render(); }
function refreshReport() { showToast('Data refreshed'); render(); }
function doExport(fmt) { showToast('Exporting as '+fmt.toUpperCase()+'… (BG-132: download stubbed)'); }

/* ── RENDER ── */
function render() {
  const canvas = document.getElementById('page-canvas');
  if (currentState==='skeleton') { canvas.innerHTML=renderSkeleton(); return; }
  if (currentState==='empty')    { canvas.innerHTML=renderEmpty(); return; }
  if (currentState==='error')    { canvas.innerHTML=renderError(); return; }
  canvas.innerHTML = currentMode==='explore' ? renderExplore() : renderExport();
}

function renderExplore() {
  // KPI strip
  const kpis = [
    { label:'Enrolled Learners',  value:COMPLETION_ANALYTICS.enrolled_learners,              unit:'total',           sub:`Cohort: Q1 2026`,                    cls:'l1',       vcls:'' },
    { label:'Completion Rate',    value:COMPLETION_ANALYTICS.completion_rate+'%',            unit:`${COMPLETION_ANALYTICS.completed_learners} completed`,  sub:`↑ 2.4pp vs last cohort`, cls:'l1-green', vcls:'green' },
    { label:'Avg Engagement',     value:ENGAGEMENT_METRICS.average_engagement_score,         unit:'score (0–100)',   sub:`p50: ${ENGAGEMENT_METRICS.engagement_score_distribution.p50} · p90: ${ENGAGEMENT_METRICS.engagement_score_distribution.p90}`, cls:'l1-teal',  vcls:'teal' },
    { label:'Median Time',        value:COMPLETION_ANALYTICS.median_time_to_complete_hours+'h', unit:'to complete',  sub:'median across completions',           cls:'l1-amber', vcls:'amber' }
  ];
  const kpiHTML = kpis.map(k=>`
    <div class="kpi-card ${k.cls}">
      <div class="kpi-label">${k.label}</div>
      <div class="kpi-value ${k.vcls}">${k.value}</div>
      <div class="kpi-unit">${k.unit}</div>
      <div class="kpi-sub">${k.sub}</div>
    </div>`).join('');

  // Completion funnel — learning_path_completion_analysis stage_counts (BG-063)
  const maxCount = FUNNEL.stage_counts.assigned;
  const stages = [
    { key:'assigned', label:'Assigned', cls:'assigned' },
    { key:'started',  label:'Started',  cls:'started' },
    { key:'midpoint', label:'Midpoint', cls:'midpoint' },
    { key:'completed',label:'Completed',cls:'completed' }
  ];
  const funnelHTML = stages.map((s,i)=>{
    const count = FUNNEL.stage_counts[s.key];
    const pct = Math.round(count/maxCount*100);
    const dropoff = FUNNEL.drop_off_rate_by_stage[s.key];
    const isTextDark = s.cls==='midpoint';
    return `<div class="funnel-stage">
      <div class="funnel-label">${s.label}</div>
      <div class="funnel-track">
        <div class="funnel-fill ${s.cls}" style="width:${pct}%">
          <span class="funnel-count${isTextDark?' dark':''}">${count}</span>
        </div>
      </div>
      <div class="funnel-pct">${pct}%</div>
      <div class="funnel-dropoff">${dropoff!=null ? '▼ '+dropoff+'%' : ''}</div>
    </div>`;
  }).join('');

  // Trend SVG — 6-month completion rate
  const svgW=260, svgH=120, padL=28, padR=12, padT=12, padB=24;
  const plotW=svgW-padL-padR, plotH=svgH-padT-padB;
  const minR=55, maxR=80;
  const pts = TREND.map((d,i)=>{
    const x=padL + (i/(TREND.length-1))*plotW;
    const y=padT + plotH - ((d.rate-minR)/(maxR-minR))*plotH;
    return {x,y,d};
  });
  const polyline = pts.map(p=>`${p.x},${p.y}`).join(' ');
  const area = `${pts[0].x},${padT+plotH} `+pts.map(p=>`${p.x},${p.y}`).join(' ')+` ${pts[pts.length-1].x},${padT+plotH}`;
  const labels = pts.map(p=>`<text x="${p.x}" y="${svgH-6}" text-anchor="middle" fill="#C0C0B8" font-size="9" font-family="Plus Jakarta Sans,sans-serif">${p.d.month}</text>`).join('');
  const dots = pts.map(p=>`<circle cx="${p.x}" cy="${p.y}" r="3" fill="#5B5BD6"/>`).join('');
  const lastP = pts[pts.length-1];
  const trendSVG = `<svg viewBox="0 0 ${svgW} ${svgH}" width="100%" height="100%">
    <defs><linearGradient id="tg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#5B5BD6" stop-opacity=".15"/><stop offset="100%" stop-color="#5B5BD6" stop-opacity="0"/></linearGradient></defs>
    <polygon points="${area}" fill="url(#tg)"/>
    <polyline points="${polyline}" fill="none" stroke="#5B5BD6" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
    ${dots}
    ${labels}
    <text x="${lastP.x+5}" y="${lastP.y+4}" fill="#18794E" font-size="10" font-weight="700" font-family="Plus Jakarta Sans,sans-serif">${lastP.d.rate}%</text>
  </svg>`;

  // Engagement score distribution
  const engRows = [
    { label:'p90', val:ENGAGEMENT_METRICS.engagement_score_distribution.p90, pct:Math.round(ENGAGEMENT_METRICS.engagement_score_distribution.p90) },
    { label:'Avg', val:ENGAGEMENT_METRICS.average_engagement_score,           pct:Math.round(ENGAGEMENT_METRICS.average_engagement_score) },
    { label:'p50', val:ENGAGEMENT_METRICS.engagement_score_distribution.p50, pct:Math.round(ENGAGEMENT_METRICS.engagement_score_distribution.p50) },
  ];
  const engHTML = engRows.map(r=>`<div class="eng-row">
    <div class="eng-label">${r.label}</div>
    <div class="eng-track"><div class="eng-fill" style="width:${r.pct}%"></div></div>
    <div class="eng-val">${r.val}</div>
  </div>`).join('');

  // Score band distribution (BG-135 mocked)
  const maxBandCount = Math.max(...SCORE_BANDS.map(b=>b.count));
  const scoreBandHTML = SCORE_BANDS.map(b=>`<div class="score-band-row">
    <div class="score-band-label">${b.label}</div>
    <div class="score-band-track"><div class="score-band-fill ${b.cls}" style="width:${Math.round(b.count/maxBandCount*100)}%"></div></div>
    <div class="score-band-count">${b.count}</div>
  </div>`).join('');

  // Recent attempts table (BG-135)
  const attemptRows = MOCK_ATTEMPTS.slice(0,8).map(a=>`<tr>
    <td><div class="cell-name">${a.learner_name}</div><div class="cell-mono">${a.learner_id}</div></td>
    <td class="cell-mono">${a.attempt_id}</td>
    <td style="text-align:center">${a.attempt_number}</td>
    <td style="text-align:center">${statusChip(a.status)}</td>
    <td>${fmtDate(a.started_at)}</td>
    <td style="text-align:center">${a.awarded_score!=null ? `<span class="score-pill ${a.passed?'pass':'fail'}">${a.awarded_score}/${a.max_score}</span>` : '—'}</td>
    <td style="text-align:center">${a.passed!=null ? (a.passed?'<span class="score-pill pass">Pass</span>':'<span class="score-pill fail">Fail</span>') : '—'}</td>
  </tr>`).join('');

  return `
    <!-- KPI STRIP -->
    <div class="kpi-strip">${kpiHTML}</div>

    <!-- CHART ROW 1: completion funnel + trend -->
    <div class="chart-grid">
      <div class="chart-card">
        <div class="chart-header">
          <div>
            <!-- BG-063: learning-analytics-service has no HTTP REST API — stage_counts mocked -->
            <div class="chart-title">Completion Funnel</div>
            <div class="chart-subtitle">Assigned → Started → Midpoint → Completed · dominant drop-off: <strong>Assigned→Started</strong></div>
          </div>
          <span class="chart-badge">BG-063 mocked</span>
        </div>
        <div class="funnel">${funnelHTML}</div>
      </div>
      <div class="chart-card">
        <div class="chart-header">
          <div>
            <div class="chart-title">Completion Rate Trend</div>
            <div class="chart-subtitle">6-month rolling · % completed</div>
          </div>
        </div>
        <div class="trend-wrap">${trendSVG}</div>
      </div>
    </div>

    <!-- CHART ROW 2: engagement dist + score dist -->
    <div class="chart-row2">
      <div class="chart-card">
        <div class="chart-header">
          <div>
            <!-- BG-063: engagement_score_distribution mocked -->
            <div class="chart-title">Engagement Score Distribution</div>
            <div class="chart-subtitle">p50 · Avg · p90 · score 0–100</div>
          </div>
          <span class="chart-badge">BG-063 mocked</span>
        </div>
        <div class="eng-chart" style="margin-top:8px">${engHTML}</div>
        <div style="margin-top:14px;font-size:11px;color:var(--ink-4)">Score = 0.35×active_min + 0.25×content_interactions + 0.20×assessment_attempts + 0.20×discussion_actions</div>
      </div>
      <div class="chart-card">
        <div class="chart-header">
          <div>
            <!-- BG-135: GET /api/v1/attempts/history has no course_id filter — score bands mocked -->
            <div class="chart-title">Assessment Score Distribution</div>
            <div class="chart-subtitle">Score bands across all attempts</div>
          </div>
          <span class="chart-badge">BG-135 mocked</span>
        </div>
        <div class="score-bands" style="margin-top:8px">${scoreBandHTML}</div>
        <div style="margin-top:12px;display:flex;align-items:center;gap:12px;font-size:11px;color:var(--ink-3)">
          <span>Passing score: 70%</span>
          <span style="color:var(--green);font-weight:700">Pass rate: 71%</span>
        </div>
      </div>
    </div>

    <!-- RECENT ATTEMPTS TABLE -->
    <div>
      <div class="section-header">
        <div>
          <div class="section-title">Assessment Attempts</div>
          <!-- BG-135: attempts mocked — GET /api/v1/attempts/history has no course_id filter -->
          <div class="section-sub">AttemptResponse shape · sorted by started_at desc · BG-135: course_id filter unavailable</div>
        </div>
        <button class="btn-g" onclick="setMode('export')">View full export →</button>
      </div>
      <div class="table-card">
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Learner</th>
                <th>Attempt ID</th>
                <th style="text-align:center">Attempt #</th>
                <th style="text-align:center">Status</th>
                <th>Started</th>
                <th style="text-align:center">Score</th>
                <th style="text-align:center">Result</th>
              </tr>
            </thead>
            <tbody>${attemptRows}</tbody>
          </table>
        </div>
        <div class="pagination">
          <div class="pag-info">Showing 8 of ${MOCK_ATTEMPTS.length} attempts</div>
          <div class="pag-controls">
            <button class="pag-btn" disabled>‹</button>
            <span class="pag-page">Page 1 of 2</span>
            <button class="pag-btn">›</button>
          </div>
        </div>
      </div>
    </div>`;
}

function renderExport() {
  // Full AttemptResponse table
  const allRows = MOCK_ATTEMPTS.map(a=>`<tr>
    <td><div class="cell-name">${a.learner_name}</div><div class="cell-mono">${a.learner_id}</div></td>
    <td class="cell-mono">${a.attempt_id}</td>
    <td class="cell-mono">${a.assessment_id}</td>
    <td style="text-align:center">${a.attempt_number}</td>
    <td style="text-align:center">${statusChip(a.status)}</td>
    <td>${fmtDate(a.started_at)}</td>
    <td>${fmtDate(a.submitted_at)}</td>
    <td style="text-align:center">${a.awarded_score!=null?a.awarded_score:'—'}</td>
    <td style="text-align:center">${a.max_score}</td>
    <td style="text-align:center">${a.passing_score}</td>
    <td style="text-align:center">${a.passed!=null?(a.passed?'<span class="score-pill pass">Pass</span>':'<span class="score-pill fail">Fail</span>'):'—'}</td>
    <td>${a.feedback||'—'}</td>
  </tr>`).join('');

  return `
    <div class="export-section">
      <div class="export-header">
        <div>
          <div class="export-title">Attempt Export — Security Fundamentals</div>
          <div style="font-size:12px;color:var(--ink-3);margin-top:3px">${MOCK_ATTEMPTS.length} attempts · AttemptResponse shape · attempt-service</div>
        </div>
        <div class="export-actions">
          <!-- BG-132: download stubbed -->
          <button class="export-btn" onclick="doExport('csv')">↓ Export CSV</button>
          <button class="export-btn primary" onclick="doExport('pdf')">↓ Export PDF</button>
        </div>
      </div>
      <div class="table-card">
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Learner</th>
                <th>Attempt ID</th>
                <th>Assessment ID</th>
                <th style="text-align:center">Attempt #</th>
                <th style="text-align:center">Status</th>
                <th>Started</th>
                <th>Submitted</th>
                <th style="text-align:center">Score</th>
                <th style="text-align:center">Max</th>
                <th style="text-align:center">Pass Mark</th>
                <th style="text-align:center">Result</th>
                <th>Feedback</th>
              </tr>
            </thead>
            <tbody>${allRows}</tbody>
          </table>
        </div>
        <div class="pagination">
          <div class="pag-info">Showing ${MOCK_ATTEMPTS.length} of ${MOCK_ATTEMPTS.length} attempts</div>
          <div class="pag-controls">
            <button class="pag-btn" disabled>‹</button>
            <span class="pag-page">Page 1 of 1</span>
            <button class="pag-btn" disabled>›</button>
          </div>
        </div>
      </div>
    </div>`;
}

function renderSkeleton() {
  return `
    <div class="kpi-strip">${[0,1,2,3].map(()=>`<div class="kpi-card"><div class="sk" style="height:11px;width:60%;margin-bottom:12px"></div><div class="sk" style="height:32px;width:40%;margin-bottom:8px"></div><div class="sk" style="height:10px;width:50%"></div></div>`).join('')}</div>
    <div class="chart-grid">
      <div class="chart-card"><div class="sk" style="height:11px;width:40%;margin-bottom:16px"></div><div class="sk" style="height:160px"></div></div>
      <div class="chart-card"><div class="sk" style="height:11px;width:60%;margin-bottom:16px"></div><div class="sk" style="height:140px"></div></div>
    </div>
    <div class="chart-row2">
      ${[0,1].map(()=>`<div class="chart-card"><div class="sk" style="height:11px;width:40%;margin-bottom:16px"></div><div class="sk" style="height:120px"></div></div>`).join('')}
    </div>
    <div class="table-card"><div style="padding:20px">${[0,1,2,3,4].map(()=>`<div class="sk" style="height:13px;margin-bottom:12px"></div>`).join('')}</div></div>`;
}

function renderEmpty() {
  return `<div class="page-empty">
    <div class="pe-icon">📊</div>
    <div class="pe-title">No analytics data</div>
    <div class="pe-sub">No data found for this course and cohort in the selected time window. Try a different course or wider date range.</div>
    <button class="btn-primary" onclick="clearAllFilters()">Clear filters</button>
  </div>`;
}

function renderError() {
  return `<div class="err-block">
    <div class="err-icon">⚠</div>
    <div>
      <div class="err-title">Failed to load course analytics</div>
      <div class="err-msg">learning-analytics-service returned no data. Check service availability and retry.</div>
      <button class="err-retry" onclick="setState('loaded')">Retry</button>
    </div>
  </div>`;
}

/* ── INIT ── */
render();
</script>
