event_name: cohort_member_added
version: 1
producer_service: cohort-service
topic: lms.cohort.cohort_member_added.v1
purpose: >-
  Published when a learner is added to a cohort (manual, rule-based, or import)
  so downstream systems can provision access, update roster views, and measure
  assignment outcomes.
payload:
  cohort_membership_id: uuid
  cohort_id: uuid
  tenant_id: uuid
  learner_id: uuid
  membership_state: enum[assigned, active, waitlisted]
  assignment_mode: enum[manual, rule_based, bulk_import]
  assignment_source:
    assigned_by: uuid
    import_file_reference: string|null
    rule_definition_id: uuid|null
  effective_date: date
  override_flags:
    allow_duplicates: boolean
    prerequisites_override: boolean
  conflict_report:
    capacity_conflict: boolean
    eligibility_conflict: boolean
    duplicate_conflict: boolean
  waitlist_position: integer|null
  assigned_at: datetime
consumers:
  - enrollment-service
  - progress-tracking-service
  - notification-service
  - analytics-service
  - audit-service
