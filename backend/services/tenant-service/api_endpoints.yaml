service: tenant-service
endpoints:
  - path: /tenants/validate
    method: POST
    operation: validate_tenant_creation_request
  - path: /tenants
    method: POST
    operation: create_tenant
  - path: /tenants/{tenant_id}/configuration
    method: PUT
    operation: initialize_tenant_configuration
  - path: /tenants/{tenant_id}/configuration
    method: PATCH
    operation: update_tenant_configuration
  - path: /tenants/{tenant_id}/configuration
    method: GET
    operation: get_tenant_configuration
  - path: /tenants/{tenant_id}/feature-flags
    method: POST
    operation: manage_tenant_feature_flags
  - path: /tenants/{tenant_id}/suspend
    method: POST
    operation: suspend_tenant
  - path: /tenants/{tenant_id}/reactivate
    method: POST
    operation: reactivate_tenant
  - path: /tenants/{tenant_id}/archive
    method: POST
    operation: archive_tenant
  - path: /tenants/{tenant_id}/decommission
    method: POST
    operation: decommission_tenant
  - path: /tenants/{tenant_id}/lifecycle
    method: GET
    operation: get_tenant_lifecycle_status
  - path: /tenants/isolation/evaluate
    method: POST
    operation: evaluate_isolation
